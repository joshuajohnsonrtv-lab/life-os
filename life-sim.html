let _manualStatus = null;
let _manualStatusTime = 0;
let _activityStart = null;
let _activityName  = null;
let _activityInterval = null;

function showFutonMenu(e) {
  e.stopPropagation();
  // Second click on futon while already there → back to center
  if (_currentZone === 'futon' || _currentZone === 'futon_sleep') {
    closeActivityMenu();
    clearActivityTimer();
    resetCharVisual();
    moveChar('center');
    _manualStatus = null;
    render();
    return;
  }
  resetCharVisual();
  moveChar('futon');
  showActivityMenu([
    { icon:'🧘', label:'Meditating',     status:'🧘 Meditating' },
    { icon:'😴', label:'Going to sleep', status:'😴 Sleeping'    },
    { icon:'💤', label:'Short nap',      status:'💤 Napping'     },
  ], { top: 368, left: 25 });
}

function showDeskMenu(e) {
  e.stopPropagation();
  // Must be seated to use the desk — auto-sit if not already
  if (!_sittingOnChair) {
    moveChar('chair');
    _sittingOnChair = true;
    const chairEl = document.getElementById('chair');
    if (chairEl) chairEl.classList.add('seated');
    const figure = document.getElementById('char-figure');
    if (figure) figure.classList.add('seated-idle');
    document.querySelector('.desk')?.classList.add('active-zone');
    const bubble = document.getElementById('char-bubble');
    if (bubble) { bubble.innerHTML = '🪑 Sitting'; bubble.style.borderColor = 'var(--muted)'; }
    _manualStatus     = '🪑 Sitting';
    _manualStatusTime = Date.now();
    saveState();
  }
  showActivityMenu([
    { icon:'💰', label:'Online hustle',       status:'💰 On the grind'    },
    { icon:'🎬', label:'Recording content',   status:'🎬 Recording'       },
    { icon:'🎮', label:'Gaming / doom scroll',status:'🎮 Wasting time...' },
    { icon:'⚡', label:'Productive work',     status:'⚡ Locked in'       },
  ], { top: 116, left: 234 }, 'down');
}

function showActivityMenu(options, pos, dir, container) {
  closeActivityMenu();
  const room = container || document.getElementById('the-room');
  const menu = document.createElement('div');
  menu.className = 'act-menu';
  menu.id = 'act-menu';
  // dir:'down' drops below anchor; default stacks above
  menu.style.top  = dir === 'down'
    ? pos.top + 'px'
    : (pos.top - options.length * 34 - 8) + 'px';
  menu.style.left = pos.left + 'px';

  options.forEach((opt, i) => {
    const b = document.createElement('div');
    b.className = 'act-bubble';
    b.style.animationDelay = (i * 0.07) + 's';
    b.innerHTML = opt.icon + ' ' + opt.label;
    b.onclick = ev => { ev.stopPropagation(); if (opt.action) { closeActivityMenu(); opt.action(); } else { selectActivity(opt); } };
    menu.appendChild(b);
  });

  room.appendChild(menu);

  // Close on click outside
  setTimeout(() => document.addEventListener('click', closeActivityMenu, { once: true }), 10);
}

function closeActivityMenu() {
  document.getElementById('act-menu')?.remove();
}

function selectActivity(opt) {
  closeActivityMenu();
  clearActivityTimer();
  // leave chair if sitting
  _sittingOnChair = false;
  document.getElementById('chair')?.classList.remove('seated');
  _manualStatus     = opt.status;
  _manualStatusTime = Date.now();
  _activityStart    = Date.now();
  _activityName     = opt.icon + ' ' + opt.label;
  applyActivityVisual(opt);
  updateActivityBubble();
  _activityInterval = setInterval(updateActivityBubble, 1000);
  // Gaming warning — fires after 3 min if wasting time; clears for any real activity
  if (opt.status === '🎮 Wasting time...') {
    _gamingStayWeakCount = 0;
    scheduleGamingWarning();
  } else {
    clearGamingWarningTimer();
    hideGamingWarning();
    _gamingStayWeakCount = 0;
  }
  saveState();
}

function applyActivityVisual(opt) {
  const head   = document.getElementById('char-head');
  const figure = document.getElementById('char-figure');
  const isSleep = opt.status === '😴 Sleeping' || opt.status === '💤 Napping';
  const isMed   = opt.status === '🧘 Meditating';

  if (isSleep) {
    moveChar('futon_sleep');
    if (head)   head.className   = 'char-head sleeping';
    if (figure) figure.className = 'char-figure laying';
  } else if (isMed) {
    moveChar('futon');
    if (head)   head.className   = 'char-head meditating';
    if (figure) figure.className = 'char-figure meditating';
  } else {
    // desk activities — char stays in chair (seated), bird's-eye working view
    _sittingOnChair = true;  // ensure seated state is preserved
    moveChar('chair');       // stay at chair position, not standing by desk
    if (head)   head.className   = 'char-head';
    if (figure) figure.className = 'char-figure at-desk';
    const chairEl = document.getElementById('chair');
    if (chairEl) { chairEl.classList.add('seated'); chairEl.classList.add('at-desk'); }
  }
}

function resetCharVisual() {
  const head   = document.getElementById('char-head');
  const figure = document.getElementById('char-figure');
  if (head)   head.className   = 'char-head';
  if (figure) figure.className = 'char-figure';
  // Un-flip chair from desk-working mode
  document.getElementById('chair')?.classList.remove('at-desk');
  // Remove sleep Z's from bubble
  document.getElementById('char-bubble')?.classList.remove('zzz');
}

function updateActivityBubble() {
  if (!_activityStart || !_manualStatus) return;
  const bubble = document.getElementById('char-bubble');
  if (!bubble) return;
  const elapsed = Math.floor((Date.now() - _activityStart) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  const t = mins > 0 ? mins + 'm ' + secs + 's' : secs + 's';
  bubble.innerHTML = _manualStatus
    + ' <span style="font-size:9px;opacity:.6">' + t + '</span>'
    + '<span onclick="stopActivity(event)" style="cursor:pointer;color:#ef4444;font-size:9px;'
    + 'background:rgba(239,68,68,.18);padding:1px 6px;border-radius:8px;margin-left:4px;pointer-events:auto">■ stop</span>';
  bubble.style.borderColor = 'var(--gold)';
  // Z's only while sleeping/napping
  const isSleepStatus = _manualStatus === '😴 Sleeping' || _manualStatus === '💤 Napping';
  bubble.classList.toggle('zzz', isSleepStatus);
}

function stopActivity(e) {
  if (e) e.stopPropagation();
  clearGamingWarningTimer();
  hideGamingWarning();
  _gamingStayWeakCount = 0;
  if (!_activityStart) return;
  const dur  = Math.floor((Date.now() - _activityStart) / 1000);
  const mins = Math.floor(dur / 60);
  const secs = dur % 60;
  const dStr = mins > 0 ? mins + 'm ' + secs + 's' : dur + 's';
  // log it
  try {
    const log = JSON.parse(localStorage.getItem('life_sim_activity_log') || '[]');
    log.unshift({ activity: _activityName, date: today(), durationSecs: dur, display: dStr });
    localStorage.setItem('life_sim_activity_log', JSON.stringify(log.slice(0, 200)));
  } catch(err) {}
  clearActivityTimer();
  resetCharVisual();
  moveChar('center');   // always walk back to middle when activity ends
  _activityStart    = null;
  _manualStatus     = null;
  _activityName     = null;
  saveState();
  const bubble = document.getElementById('char-bubble');
  if (bubble) {
    bubble.innerHTML = '✅ Done · ' + dStr;
    bubble.style.borderColor = 'var(--green)';
  }
  setTimeout(render, 3000);
}

function clearActivityTimer() {
  if (_activityInterval) { clearInterval(_activityInterval); _activityInterval = null; }
}

let _sittingOnChair = false;

function toggleChair(e) {
  e.stopPropagation();
  _sittingOnChair = !_sittingOnChair;
  const chairEl = document.getElementById('chair');
  const figure  = document.getElementById('char-figure');
  if (_sittingOnChair) {
    resetCharVisual();
    moveChar('chair');
    if (chairEl) chairEl.classList.add('seated');
    // Seated-idle visual — shorter body, no idle bob
    if (figure) figure.classList.add('seated-idle');
    const bubble = document.getElementById('char-bubble');
    if (bubble) { bubble.innerHTML = '🪑 Sitting'; bubble.style.borderColor = 'var(--muted)'; }
    _manualStatus     = '🪑 Sitting';
    _manualStatusTime = Date.now();
    saveState();
  } else {
    // Standing up: stop any running desk activity first
    if (_activityStart) stopActivity(null);
    document.querySelector('.desk')?.classList.remove('active-zone');
    moveChar('center');
    if (chairEl) chairEl.classList.remove('seated');
    _manualStatus = null;
    saveState();
    render();
  }
}

function _getFacialData() {
  try {
    const d = JSON.parse(localStorage.getItem('wellness_data') || 'null');
    if (!d || !d.facialExercises) return { exercises: ['Chin tucks', 'Face curls', 'Jaw stretch', 'Cheek puff', 'Brow lift'], log: {} };
    return d.facialExercises;
  } catch(e) { return { exercises: ['Chin tucks', 'Face curls', 'Jaw stretch', 'Cheek puff', 'Brow lift'], log: {} }; }
}
function _saveFacialComplete(ex) {
  try {
    const raw = JSON.parse(localStorage.getItem('wellness_data') || '{}');
    if (!raw.facialExercises) raw.facialExercises = { exercises: [], log: {} };
    const t = new Date().toISOString().split('T')[0];
    if (!raw.facialExercises.log[t]) raw.facialExercises.log[t] = { completed: [], notes: '' };
    const arr = raw.facialExercises.log[t].completed;
    const idx = arr.indexOf(ex);
    if (idx >= 0) arr.splice(idx, 1); else arr.push(ex);
    localStorage.setItem('wellness_data', JSON.stringify(raw));
  } catch(e) {}
}
function _renderFaceModal() {
  const fe = _getFacialData();
  const t = new Date().toISOString().split('T')[0];
  const completed = (fe.log[t] || {}).completed || [];
  const isFaceActive = _activityName === '✨ Facial exercises';

  const listHTML = fe.exercises.length ? fe.exercises.map(ex => {
    const done = completed.includes(ex);
    return `<div class="face-check-item ${done?'done':''}" onclick="event.stopPropagation();_toggleFaceEx('${ex.replace(/'/g,"\\'")}')">
      <div class="face-check-box">${done?'✓':''}</div>
      <span class="face-check-label">${ex}</span>
    </div>`;
  }).join('') : `<div style="font-size:11px;color:var(--muted);padding:8px 0">No exercises set — add some in Wellness → Facial & Mewing</div>`;

  const done = completed.filter(ex => fe.exercises.includes(ex)).length;
  const total = fe.exercises.length;
  const pct = total ? Math.round((done/total)*100) : 0;

  document.getElementById('face-modal-body').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700">Today · ${done}/${total}</span>
      <span style="font-size:13px;font-weight:900;color:var(--green)">${pct}%</span>
    </div>
    <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:14px">
      <div style="height:100%;width:${pct}%;background:var(--green);border-radius:2px;transition:width .6s ease"></div>
    </div>
    ${listHTML}
    <div style="margin-top:16px">
      <button class="face-start-btn ${isFaceActive?'active':''}" onclick="event.stopPropagation();_toggleFaceSession()">
        ${isFaceActive ? '■ Stop session' : '✨ Start facial exercise session'}
      </button>
    </div>
    <div style="margin-top:10px;text-align:center">
      <span style="font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline"
        onclick="event.stopPropagation();closeFaceModal();window.parent.postMessage({action:'openWellnessFacial'},'*')">
        Open in Wellness →
      </span>
    </div>
  `;
}
function _toggleFaceEx(ex) {
  _saveFacialComplete(ex);
  _renderFaceModal();
}
function _toggleFaceSession() {
  if (_activityName === '✨ Facial exercises') {
    stopActivity({ stopPropagation:()=>{} });
  } else {
    closeFaceModal();
    moveChar('center');
    const figure = document.getElementById('char-figure');
    const head   = document.getElementById('char-head');
    if (figure) { figure.className = 'char-figure face-ex'; }
    if (head)   { head.className   = 'char-head face-ex'; }
    _sittingOnChair = false;
    _activityStart    = Date.now();
    _activityName     = '✨ Facial exercises';
    _manualStatus     = '✨ Facial exercises';
    _manualStatusTime = Date.now();
    clearActivityTimer();
    updateActivityBubble();
    _activityInterval = setInterval(updateActivityBubble, 1000);
    saveState();
  }
}

// ─────────────────────────────────────────────
//  ROOM SCALING
//  Uses CSS transform:scale() so ALL interior
//  positions, character coords and menus stay
//  pixel-perfect — only the whole room shrinks.
//
//  Uses window.innerWidth/Height (always reliable
//  inside iframes) instead of element.clientHeight
//  (which can return 0 before layout is painted).
// ─────────────────────────────────────────────
function scaleRoom() {
  document.querySelectorAll('.room-container').forEach(container => _scaleContainer(container));
}
function _scaleContainer(container) {
  if (!container) return;

  const DESIGN_W = 430, DESIGN_H = 510;

  // Subtract the sim's own header + loc-bar heights
  const hdr = document.querySelector('.hdr');
  const loc = document.querySelector('.loc-bar');
  const hdrH = hdr ? hdr.offsetHeight : 48;
  const locH = loc ? loc.offsetHeight : 44;

  const availW = window.innerWidth  - 8;
  const availH = window.innerHeight - hdrH - locH - 8;

  if (availW <= 0 || availH <= 0) return; // layout not ready yet

  const scale = Math.min(availW / DESIGN_W, availH / DESIGN_H, 1.0);

  container.style.transformOrigin = 'center center';

  if (scale >= 0.995) {
    container.style.transform = 'none';
    container.style.marginTop = container.style.marginBottom = '';
    container.style.marginLeft = container.style.marginRight = '';
  } else {
    container.style.transform = `scale(${scale.toFixed(4)})`;
    // Negative margins shrink the layout footprint to match the visual size
    // so the flex container centres the scaled room correctly.
    const mH = ((DESIGN_H * (1 - scale)) / 2).toFixed(2);
    const mW = ((DESIGN_W * (1 - scale)) / 2).toFixed(2);
    container.style.marginTop    = container.style.marginBottom = `-${mH}px`;
    container.style.marginLeft   = container.style.marginRight  = `-${mW}px`;
  }
}

const _DEFAULT_FOOD = [
  { name:'Chicken breast', qty:0, unit:'pieces'   },
  { name:'Brown rice',     qty:0, unit:'cups'      },
  { name:'Broccoli',       qty:0, unit:'portions'  },

function _getFood() {
  try {
    const s = localStorage.getItem('life_sim_food');
    return s ? JSON.parse(s) : JSON.parse(JSON.stringify(_DEFAULT_FOOD));
  } catch(e) { return JSON.parse(JSON.stringify(_DEFAULT_FOOD)); }
}
function _saveFood(f) {
  try { localStorage.setItem('life_sim_food', JSON.stringify(f)); } catch(e) {}
}

function showFridgeInventory() {
  document.getElementById('k-fridge-modal')?.remove();
  const modal = document.createElement('div');
  modal.className = 'k-fridge-modal';
  modal.id = 'k-fridge-modal';
  modal.onclick = ev => { if (ev.target === modal) modal.remove(); };
  _renderFridgeModal(modal);
  document.body.appendChild(modal);
}

function _renderFridgeModal(modal) {
  const food = _getFood();
  const rows = food.map((f,i) => `
    <div class="food-row">
      <span class="f-name">${f.name}</span>
      <button class="f-btn" onclick="_foodAdj(${i},-1)">−</button>
      <span class="f-qty">${f.qty}</span>
      <span class="f-unit">${f.unit}</span>
      <button class="f-btn" onclick="_foodAdj(${i},1)">+</button>
      <button class="f-btn f-del" onclick="_foodDel(${i})" title="Remove">×</button>
    </div>`).join('');
  modal.innerHTML = `
    <div class="k-fridge-inner" onclick="event.stopPropagation()">
      <div class="kf-hdr">
        <div class="kf-title">🧊 Food Stock</div>
        <button class="kf-x" onclick="document.getElementById('k-fridge-modal').remove()">×</button>
      </div>
      <div class="kf-body">${rows || '<p style="color:rgba(255,255,255,.3);font-size:12px;padding:10px 0">Fridge is empty — add items below.</p>'}</div>
      <div class="kf-add">
        <input id="f-inp-name" placeholder="Item name…" onkeydown="if(event.key==='Enter')_foodAdd()">
        <input id="f-inp-unit" placeholder="Unit" style="max-width:70px" onkeydown="if(event.key==='Enter')_foodAdd()">
        <button class="kf-add-btn" onclick="_foodAdd()">+</button>
      </div>
    </div>`;
}

function _foodAdj(i, d) {
  const f = _getFood();
  if (!f[i]) return;
  f[i].qty = Math.max(0, (f[i].qty || 0) + d);
  _saveFood(f);
  const m = document.getElementById('k-fridge-modal');
  if (m) _renderFridgeModal(m);
}

function _foodDel(i) {
  const f = _getFood();
  f.splice(i, 1);
  _saveFood(f);
  const m = document.getElementById('k-fridge-modal');
  if (m) _renderFridgeModal(m);
}

function _foodAdd() {
  const nameEl = document.getElementById('f-inp-name');
  const unitEl = document.getElementById('f-inp-unit');
  const n = nameEl?.value.trim();
  const u = unitEl?.value.trim() || 'units';
  if (!n) return;
  const f = _getFood();
  f.push({ name:n, qty:0, unit:u });
  _saveFood(f);
  const m = document.getElementById('k-fridge-modal');
  if (m) _renderFridgeModal(m);
}

let _gamingWarningTimer = null;
let _gamingStayWeakCount = 0;

function scheduleGamingWarning(delayMs) {
  clearGamingWarningTimer();
  _gamingWarningTimer = setTimeout(showGamingWarning, delayMs ?? 60 * 1000);
}

function clearGamingWarningTimer() {
  if (_gamingWarningTimer) { clearTimeout(_gamingWarningTimer); _gamingWarningTimer = null; }
}

function hideGamingWarning() {
  document.getElementById('gaming-warn')?.classList.remove('show');
}

function showGamingWarning() {
  const msg = GAMING_MSGS[Math.floor(Math.random() * GAMING_MSGS.length)];
  document.getElementById('gwarn-icon').textContent  = msg.icon;
  document.getElementById('gwarn-title').textContent = msg.title;
  document.getElementById('gwarn-body').textContent  = msg.body;
  document.getElementById('gaming-warn').classList.add('show');
  // If they ignore it, pulse the warning again after 2 min
  clearGamingWarningTimer();
  _gamingWarningTimer = setTimeout(() => {
    hideGamingWarning();
    _gamingWarningTimer = setTimeout(showGamingWarning, 90 * 1000);
  }, 25 * 1000); // auto-hide after 25s, come back in 90s
}

function gamingBeBetter() {
  hideGamingWarning();
  clearGamingWarningTimer();
  _gamingStayWeakCount = 0;
  // Stop gaming activity (handles timer, char reset, center move)
  stopActivity(null);
  // Turn off PC
  _pcOn = false;
  updateDevices();
  saveState();
  // Show redemption suggestions after brief pause
  setTimeout(() => {
    const bubble = document.getElementById('char-bubble');
    if (bubble) { bubble.innerHTML = '⚡ Let\'s get it.'; bubble.style.borderColor = 'var(--gold)'; }
    showActivityMenu([
      { icon:'💻', label:'Mac Mini — real work', action:() => {
        _miniOn = true; _lastDevice = 'mac'; updateDevices(); saveState();
        selectActivity({ icon:'⚡', label:'Productive work', status:'⚡ Locked in' });
      }},
      { icon:'🏋️', label:'Go to the gym',     action:() => goLoc('outside') },
      { icon:'💰', label:'Online hustle',      status:'💰 On the grind'   },
      { icon:'🎬', label:'Record content',     status:'🎬 Recording'      },
    ], { top: 228, left: 160 }, 'up');
  }, 350);
}

function gamingStayWeak() {
  hideGamingWarning();
  _gamingStayWeakCount++;
  // Gets more frequent the more you ignore it: 1min → 30s → 20s → 15s → stays at 15s
  const delays = [60*1000, 30*1000, 20*1000, 15*1000];
  const delay = delays[Math.min(_gamingStayWeakCount, delays.length - 1)];
  scheduleGamingWarning(delay);
}

// ─────────────────────────────────────────────
//  STATE PERSISTENCE (survives tab close/reopen)
// ─────────────────────────────────────────────
function saveState() {
  if (!_initDone) return; // never stomp saved state during the init render pass
  try {
    // Which scene is currently visible?
    const loc = document.getElementById('view-kitchen')?.classList.contains('show') ? 'kitchen'
              : document.getElementById('view-outside')?.classList.contains('show') ? 'outside'
              : 'room';
    // Capture actual CSS classes so they restore exactly
    const figEl   = document.getElementById('char-figure');
    const headEl  = document.getElementById('char-head');
    const chairEl = document.getElementById('chair');
    localStorage.setItem('life_sim_runtime', JSON.stringify({
      zone:          _currentZone,
      sitting:       _sittingOnChair,
      status:        _manualStatus,
      activityName:  _activityName,
      activityStart: _activityStart || null,
      // Room / device state
      pcOn:          _pcOn,
      miniOn:        _miniOn,
      lastDevice:    _lastDevice,
      curtains:      _curtainsDrawn,
      lightOn:       _lightOn,
      // Scene + char visual (so kitchen/outside + any animation restores)
      loc,
      figClass:   figEl   ? figEl.className   : 'char-figure',
      headClass:  headEl  ? headEl.className  : 'char-head',
      chairClass: chairEl ? chairEl.className : 'chair',
      // Kitchen state
      kZone:    _kZone    || 'entry',
      kSitting: _kSitting || false,
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('life_sim_runtime') || 'null');
    if (!s) return;

    // ── 1. Device / room state ──
    if (s.pcOn      !== undefined) _pcOn          = s.pcOn;
    if (s.miniOn    !== undefined) _miniOn        = s.miniOn;
    if (s.lastDevice)              _lastDevice    = s.lastDevice;
    if (s.curtains  !== undefined) _curtainsDrawn = s.curtains;
    if (s.lightOn   !== undefined) _lightOn       = s.lightOn;
    updateDevices();
    updateRoom();
    const sw = document.getElementById('light-switch');
    if (sw) sw.className = 'light-switch' + (_lightOn ? ' on' : '');

    // ── 2. Room character position ──
    if (s.zone && POS[s.zone]) {
      _currentZone = s.zone;
      const charEl = document.getElementById('char');
      if (charEl) {
        charEl.style.top  = POS[s.zone].top  + 'px';
        charEl.style.left = POS[s.zone].left + 'px';
      }
      if (s.zone === 'desk' || s.zone === 'chair')
        document.querySelector('.desk')?.classList.add('active-zone');
      if (s.zone === 'futon' || s.zone === 'futon_sleep')
        document.querySelector('.futon')?.classList.add('active-zone');
    }

    // ── 3. Chair sitting ──
    if (s.sitting) {
      _sittingOnChair = true;
      document.querySelector('.desk')?.classList.add('active-zone');
    }

    // ── 4. Character visual — restore saved className strings directly.
    //       This handles every state: idle, laying, at-desk, cooking,
    //       fridge-check, meditating, seated-idle — no more guessing.
    const figure  = document.getElementById('char-figure');
    const head    = document.getElementById('char-head');
    const chairEl = document.getElementById('chair');
    if (s.figClass   && figure)   figure.className   = s.figClass;
    if (s.headClass  && head)     head.className     = s.headClass;
    if (s.chairClass && chairEl)  chairEl.className  = s.chairClass;

    // ── 5. Activity timer ──
    if (s.activityStart && s.activityName && s.status) {
      _activityStart    = s.activityStart;
      _activityName     = s.activityName;
      _manualStatus     = s.status;
      _manualStatusTime = Date.now();
      clearActivityTimer();
      updateActivityBubble();
      _activityInterval = setInterval(updateActivityBubble, 1000);
      // Re-arm gaming warning for time already elapsed
      if (_activityName && _activityName.includes('Gaming')) {
        const elapsed   = Date.now() - _activityStart;
        const remaining = 60 * 1000 - elapsed;
        if (remaining > 0) scheduleGamingWarning(remaining);
        else showGamingWarning();
      }
    } else if (s.status) {
      _manualStatus     = s.status;
      _manualStatusTime = Date.now();
    }

    // ── 6. Scene (kitchen / outside override room view) ──
    if (s.loc === 'kitchen') {
      goLoc('kitchen');
      if (s.kZone && s.kZone !== 'entry') {
        _kZone    = s.kZone;
        _kSitting = !!s.kSitting;
        kMoveChar(s.kZone);
        if (s.kSitting && s.kZone.startsWith('stool')) {
          document.getElementById('kstool-' + s.kZone.slice(-1))
            ?.classList.add('occupied');
        }
      }
      if (s.status) {
        const kb = document.getElementById('k-bubble');
        if (kb) kb.textContent = s.status;
      }
    } else if (s.loc === 'outside') {
      goLoc('outside');
    }
  } catch(e) {}
}

function manualSave() {
  saveState();
  // Flash the nav save button (loc-bar)
  const saveBtn = document.getElementById('save-btn');
  if (saveBtn) {
    const orig = saveBtn.innerHTML;
    saveBtn.innerHTML = '✓ Saved';
    saveBtn.classList.add('saved');
    setTimeout(() => { saveBtn.innerHTML = orig; saveBtn.classList.remove('saved'); }, 1600);
  }
  // Flash the sink (kitchen save)
  const sink = document.getElementById('k-sink');
  if (sink) {
    sink.classList.add('saved');
    setTimeout(() => sink.classList.remove('saved'), 1600);
  }
}

// ─────────────────────────────────────────────
// Call scaleRoom multiple times to survive iframe
// layout timing — first call is immediate, then
// retries after paint/layout settle.
scaleRoom();
setTimeout(scaleRoom, 60);
setTimeout(scaleRoom, 250);
window.addEventListener('resize', scaleRoom);
render();
updateRoomPoster();
loadState(); // restore character position + active activity after tab reopen
_initDone = true; // ← unlock saveState AFTER loadState so render()'s moveChar doesn't stomp saved data

setInterval(render, 30000);
setInterval(saveState, 5000); // auto-save every 5s

// Safari iOS: save before tab is frozen/closed (pagehide is more reliable than beforeunload on iOS)
window.addEventListener('pagehide', saveState);

// Safari iOS: restore state when page comes back from bfcache (back-forward cache)
window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    // Page was restored from bfcache — re-apply state (timers resume but DOM needs refresh)
    render();
    loadState();
  }
});

<div class="prog-overlay" id="prog-overlay" onclick="closeProgressModal()"></div>
<div class="prog-sheet" id="prog-sheet">
  <div class="prog-sheet-handle"></div>
  <div class="prog-sheet-head">
    <span class="prog-sheet-title">📊 Progress Breakdown</span>
    <button class="prog-sheet-close" onclick="closeProgressModal()">✕</button>
  </div>
  <div class="prog-sheet-body" id="prog-sheet-body"></div>
</div>

<!-- ── GAMING WARNING OVERLAY ── -->
<div id="gaming-warn">
  <div class="gwarn-box">
    <div class="gwarn-icon" id="gwarn-icon">⚡</div>
    <div class="gwarn-title" id="gwarn-title"></div>
    <div class="gwarn-body"  id="gwarn-body"></div>
    <button class="gwarn-btn-better" onclick="gamingBeBetter()">⚡ Be Better</button>
    <button class="gwarn-btn-weak"   onclick="gamingStayWeak()">Stay Weak</button>
  </div>
</div>
</body>
</html>
