<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>The Sim — Joshua</title>
<style>
:root {
  --bg:#0d0d0f; --bg2:#141416; --surface:#1a1a1e; --border:#2a2a30;
  --text:#e8e8ec; --muted:#6b7280; --muted2:#9ca3af;
  --gold:#f5c542; --green:#22c55e; --red:#ef4444;
  --blue:#3b82f6; --purple:#a855f7; --orange:#f97316;
  --floor:#2a1c0e; --wall-col:#13121e;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;gap:16px;padding:10px 18px;
  border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
}
.hdr-title{font-size:16px;font-weight:900;letter-spacing:-0.5px;white-space:nowrap;}
.out-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:160px;cursor:pointer;padding:4px 6px;border-radius:8px;transition:background .15s;}
.out-wrap:hover{background:rgba(255,255,255,.05);}
.out-label{font-size:10px;color:var(--muted);white-space:nowrap;font-weight:700;text-transform:uppercase;}
.out-track{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.out-fill{height:100%;border-radius:4px;background:var(--gold);transition:width 1.2s ease,background 1s ease;}
.out-pct{font-size:13px;font-weight:900;min-width:36px;text-align:right;transition:color 1s ease;}

/* ── FACIAL EXERCISE MODAL ── */
.face-check-item{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.face-check-item:last-child{border-bottom:none;}
.face-check-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  flex-shrink:0;transition:all .15s;}
.face-check-item.done .face-check-box{background:var(--green);border-color:var(--green);color:#000;}
.face-check-label{font-size:12px;font-weight:600;flex:1;}
.face-check-item.done .face-check-label{text-decoration:line-through;color:var(--muted);}
.face-start-btn{width:100%;padding:13px;border-radius:12px;border:none;
  background:linear-gradient(135deg,rgba(245,197,66,.18),rgba(245,197,66,.08));
  border:1px solid rgba(245,197,66,.35);color:var(--gold);
  font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;font-family:inherit;}
.face-start-btn:hover{background:rgba(245,197,66,.22);}
.face-start-btn.active{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#ef4444;}

/* ── PROGRESS MODAL ── */
.prog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;
  opacity:0;pointer-events:none;transition:opacity .25s;}
.prog-overlay.open{opacity:1;pointer-events:auto;}
.prog-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:901;
  background:#0e1016;border-top:1px solid rgba(255,255,255,.1);border-radius:18px 18px 0 0;
  max-height:82vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.prog-sheet.open{transform:translateY(0);}
.prog-sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;
  margin:10px auto 0;}
.prog-sheet-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.prog-sheet-title{font-size:13px;font-weight:900;letter-spacing:.3px;}
.prog-sheet-close{background:none;border:none;color:var(--muted);font-size:18px;
  cursor:pointer;padding:0 4px;line-height:1;}
.prog-sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 32px;
  display:flex;flex-direction:column;gap:12px;}
.prog-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:380px){.prog-grid{grid-template-columns:1fr;}}
.pot-badge{font-size:10px;font-weight:700;white-space:nowrap;padding:3px 10px;
  border-radius:20px;border:1px solid rgba(168,85,247,.35);background:rgba(168,85,247,.07);color:var(--purple);}
.refresh-btn{padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:11px;cursor:pointer;flex-shrink:0;}
.refresh-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ── LOC BAR ── */
.loc-bar{
  display:flex;align-items:center;gap:0;
  padding:8px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;-ms-overflow-style:none;
}
.loc-bar::-webkit-scrollbar{display:none;}
.loc-group{display:flex;gap:0;flex-shrink:0;}
.loc-btn{padding:7px 18px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.loc-group .loc-btn:first-child{border-radius:8px 0 0 8px;}
.loc-group .loc-btn:last-child{border-radius:0 8px 8px 0;border-left:none;}
.loc-btn.active{background:var(--gold);color:#000;border-color:var(--gold);}
.save-btn{
  margin-left:12px;flex-shrink:0;padding:6px 14px;
  background:transparent;border:1px solid var(--border);border-radius:8px;
  color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;
  transition:border-color .2s,color .2s;white-space:nowrap;
}
.save-btn:hover{border-color:var(--gold);color:var(--gold);}
.save-btn.saved{border-color:var(--gold);color:var(--gold);}

/* ── BODY ── */
.sim-body{display:flex;flex:1;overflow:hidden;}

/* ── ROOM ── */
.room-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;}
/* container holds .room + .room-glow as siblings so room filter never touches the glow */
.room-container{position:relative;width:430px;height:510px;flex-shrink:0;}
.room{
  position:absolute;inset:0;
  background:var(--floor);border:3px solid #2a2a1a;border-radius:4px;
  overflow:hidden;transition:filter 1.5s ease;
}
.room.dim {filter:brightness(.35) saturate(.3) hue-rotate(22deg);}  /* curtains drawn */
.room.mid {filter:brightness(.62) saturate(.95);}                   /* curtains open, no light (~60% of switch-on) */
.room.lit {filter:brightness(1.04) saturate(1.18);}                 /* light switch on */

/* floor — dark wood planks */
.room::before{
  content:'';position:absolute;inset:0;z-index:0;
  background-image:
    repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 38px,
      rgba(0,0,0,.18) 38px, rgba(0,0,0,.18) 39px
    ),
    repeating-linear-gradient(
      0deg,
      transparent 0px, transparent 27px,
      rgba(255,255,255,.022) 27px, rgba(255,255,255,.022) 28px
    );
  background-size:39px 28px;
}
/*
  Monitor glow — narrow vertical beam directly below the monitor.
  Monitor centre in room coords ≈ x:147. Room-glow div is left:16→right:16, width≈398px.
  Monitor centre in glow-div % = (147-16)/398 ≈ 33%.
  Ellipse x-radius 90px keeps light off the door (x≈394). Y-radius 400px
  means the faint tip barely kisses the futon at y≈366 (glow centre at y≈32).
*/
/*
  Glow is a SIBLING of .room (inside .room-container) so the room's
  filter:brightness() can never dim it. No counter-filter needed.
  Position matches where it would sit inside the room:
    top:34px = monitor face, left:16px/right:16px = room inner padding.
  z-index:99 puts it above .room's stacking context.
  Alpha values tuned for ~75% brightness at the core.
*/
.room-glow{
  position:absolute;top:34px;left:16px;right:16px;height:400px;z-index:99;
  pointer-events:none;opacity:0;
  transition:opacity 1s ease, background .4s;
}
.room-glow.on-pc{
  opacity:1;
  background:
    radial-gradient(ellipse 120px 400px at 33% 1%,
      rgba(30,140,255,.92) 0%,
      rgba(30,140,255,.60) 14%,
      rgba(30,140,255,.28) 40%,
      rgba(30,140,255,.08) 64%,
      transparent 82%);
}
.room-glow.on-mac{
  opacity:1;
  background:
    radial-gradient(ellipse 120px 400px at 33% 1%,
      rgba(232,180,32,.88) 0%,
      rgba(232,180,32,.56) 14%,
      rgba(232,180,32,.26) 40%,
      rgba(232,180,32,.08) 64%,
      transparent 82%);
}

/* ── WALLS ── */
.wt{position:absolute;top:0;left:0;right:0;height:16px;background:linear-gradient(180deg,#1a192c,#13121e);border-bottom:2px solid #2d2b40;z-index:2;}
.wl{position:absolute;top:0;left:0;bottom:0;width:16px;background:linear-gradient(90deg,#1a192c,#13121e);border-right:2px solid #2d2b40;z-index:2;}
.wr{position:absolute;top:0;right:0;bottom:0;width:16px;background:linear-gradient(270deg,#1a192c,#13121e);border-left:2px solid #2d2b40;z-index:2;}
.wb{position:absolute;bottom:0;left:0;right:0;height:16px;background:linear-gradient(0deg,#1a192c,#13121e);border-top:2px solid #2d2b40;z-index:2;}

/* ── WINDOW — always on during day, off at night ── */
.window{
  position:absolute;right:0;bottom:75px;width:16px;height:72px;z-index:3;
  background:rgba(180,220,255,.55);
  border-left:2px solid rgba(160,210,255,.9);
  box-shadow:inset -1px 0 10px rgba(160,210,255,.35);
  transition:background .8s,border-color .8s,box-shadow .8s;
}
.window::after{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(160,210,255,.6);}
.window.night{
  background:rgba(15,20,45,.45);
  border-color:rgba(30,40,80,.5);
  box-shadow:none;
}
.window.night::after{background:rgba(30,40,80,.4);}
/* daylight spill from window — hidden when curtains drawn or night */
/* window centre: right:8px, bottom:111px — gradient origin at 100% 50% of this div */
.win-light{
  position:absolute;right:8px;bottom:36px;width:150px;height:150px;z-index:1;
  background:radial-gradient(ellipse at 100% 50%,
    rgba(180,220,255,.22) 0%,
    rgba(180,220,255,.10) 35%,
    rgba(180,220,255,.03) 60%,
    transparent 75%);
  pointer-events:none;
  transition:opacity .7s ease;
}

/* ── WARDROBES — bottom wall, left + right ── */
.ward{
  position:absolute;bottom:0;width:90px;height:56px;z-index:3;
  background:linear-gradient(180deg,#20182e 0%,#16101e 100%);
  border:2px solid #352848;border-radius:2px 2px 0 0;
  box-shadow:inset 0 1px 0 rgba(180,140,255,.06),0 -2px 8px rgba(0,0,0,.4);
}
/* double-door centre line */
.ward::before{
  content:'';position:absolute;top:6px;bottom:0;left:50%;width:1px;
  background:linear-gradient(180deg,#3a2a50,#241838);
}
/* two handles */
.ward::after{
  content:'';position:absolute;bottom:14px;left:calc(25% - 4px);
  width:8px;height:8px;border-radius:2px;background:#3a2a50;border:1px solid #4a3860;
  box-shadow:calc(50% + 4px) 0 0 #3a2a50, calc(50% + 4px) 0 0 1px #4a3860;
}
.ward-l{left:18px;}
.ward-r{right:18px;}

/* ── DESK ── */
.desk{
  position:absolute;top:20px;left:18px;width:258px;height:92px;z-index:3;
  background:linear-gradient(180deg,#3e2810 0%,#2e1c08 100%);
  border:2px solid #6b4520;border-radius:3px;
  box-shadow:inset 0 1px 0 rgba(255,200,100,.07),0 2px 8px rgba(0,0,0,.5);
  cursor:pointer;transition:border-color .2s,box-shadow .2s;
}
.desk:hover,.desk.active-zone{border-color:var(--gold);box-shadow:0 0 10px rgba(245,197,66,.15),inset 0 1px 0 rgba(255,200,100,.07);}
.desk > *{pointer-events:none;}
/* tower off state */
.tower.off .tower-led{background:#1a1a1a;animation:none;box-shadow:none;}

/* ── CHAIR — gray office chair below desk ── */
.chair{
  position:absolute;top:118px;left:128px;z-index:3;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;
  transition:opacity .15s;
}
.chair:hover{opacity:.8;}
/* backrest */
.chair-back{
  width:36px;height:8px;
  background:linear-gradient(180deg,#5a5a68,#42424e);
  border:1.5px solid #6e6e7e;border-radius:3px 3px 0 0;
}
/* seat */
.chair-seat{
  width:36px;height:28px;
  background:linear-gradient(180deg,#4c4c5a,#38383e);
  border:1.5px solid #6a6a7a;border-bottom-width:2.5px;border-radius:0 0 4px 4px;
  box-shadow:0 3px 8px rgba(0,0,0,.55);
}
/* subtle armrests on sides */
.chair-seat::before,.chair-seat::after{
  content:'';position:absolute;top:4px;width:5px;height:14px;
  background:#484856;border:1px solid #6a6a7a;border-radius:2px;
}
.chair-seat::before{left:-5px;}
.chair-seat::after{right:-5px;}
.chair.seated .chair-back,.chair.seated .chair-seat{border-color:var(--gold);}

/* ── LIGHT SWITCH — right wall, just past the door ── */
.light-switch{
  position:absolute;right:2px;top:70px;width:12px;height:20px;z-index:6;
  background:#1e1e2a;border:1px solid #2e2e3e;border-radius:3px;
  cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;
}
.light-switch::after{
  content:'';width:5px;height:10px;border-radius:2px;
  background:#2e2e3e;border:1px solid #3e3e50;transition:all .2s;
}
.light-switch.on{background:#2a2416;border-color:#7a6020;}
.light-switch.on::after{background:#f0c840;border-color:#e0a820;box-shadow:0 0 6px rgba(240,200,64,.6);}

/* ── WINDOW CURTAINS ── */
.window.curtains{
  background:rgba(40,22,30,.85);
  border-color:rgba(70,38,50,.6);
  box-shadow:none;
}
.window.curtains::after{background:rgba(70,38,50,.4);}
/* desk strip at very back */
.d-strip{
  position:absolute;top:4px;left:6px;right:6px;height:5px;
  background:linear-gradient(90deg,#1a1a20,#28282e,#1a1a20);
  border:1px solid #303038;border-radius:2px;
}
/* big wide monitor — thin bar */
.d-monitor{
  position:absolute;top:15px;left:26px;right:26px;height:7px;
  background:#06080e;border:1.5px solid #22223a;border-radius:2px;
  transition:border-color .4s,box-shadow .4s;
}
/* PC on — blue */
.d-monitor.on-pc{
  border-color:#2090ff;
  box-shadow:0 0 10px rgba(30,140,255,.65),0 0 30px rgba(30,140,255,.2),inset 0 0 5px rgba(30,140,255,.15);
}
.d-monitor.on-pc::before{
  content:'';position:absolute;inset:-3px -6px;
  background:rgba(30,140,255,.06);border-radius:4px;
  box-shadow:0 0 22px rgba(30,140,255,.22);pointer-events:none;
}
.d-monitor.on-pc::after{
  content:'';position:absolute;inset:1px;
  background:linear-gradient(90deg,#00122a,#002448,#00122a);
  animation:screenFlicker 4s ease-in-out infinite;border-radius:1px;
}
/* Mac Mini on — yellow/amber */
.d-monitor.on-mac{
  border-color:#e8b820;
  box-shadow:0 0 10px rgba(232,184,32,.65),0 0 30px rgba(232,184,32,.2),inset 0 0 5px rgba(232,184,32,.15);
}
.d-monitor.on-mac::before{
  content:'';position:absolute;inset:-3px -6px;
  background:rgba(232,184,32,.06);border-radius:4px;
  box-shadow:0 0 22px rgba(232,184,32,.22);pointer-events:none;
}
.d-monitor.on-mac::after{
  content:'';position:absolute;inset:1px;
  background:linear-gradient(90deg,#1c1000,#2e1c00,#1c1000);
  animation:screenFlicker 4s ease-in-out infinite;border-radius:1px;
}
@keyframes screenFlicker{0%,100%{opacity:.5;}50%{opacity:1;}}
/* corner speakers */
.d-spkr{
  position:absolute;top:12px;width:18px;height:20px;
  background:linear-gradient(180deg,#1e1e1e,#141414);
  border:1px solid #333;border-radius:2px;
}
.d-spkr-l{left:4px;}
.d-spkr-r{right:4px;}
/* mac mini — clickable independently */
.d-mini{
  position:absolute;top:34px;right:4px;width:14px;height:14px;
  background:linear-gradient(135deg,#c4c4c4,#969696);
  border:1px solid #787878;border-radius:3px;
  box-shadow:0 1px 3px rgba(0,0,0,.6);
  pointer-events:auto;cursor:pointer;transition:box-shadow .3s;
}
.d-mini::after{
  content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:#555;
}
.d-mini.on{box-shadow:0 0 8px rgba(255,160,40,.5),0 1px 3px rgba(0,0,0,.6);}
.d-mini.on::after{background:#f0a030;box-shadow:0 0 5px rgba(255,160,0,.9);}

/* keyboards — wider, centred across desk (desk=258px, centre=129px) */
.d-kbd{
  position:absolute;top:44px;left:78px;width:102px;height:13px;
  background:#0e0e14;border:1px solid #252530;border-radius:2px;
  background-image:repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(255,255,255,.03) 5px,rgba(255,255,255,.03) 6px);
}
.d-kbd2{
  top:61px;left:80px;width:98px;height:10px;
}
/* tiny mouse — right of keyboards */
.d-mouse{
  position:absolute;top:57px;right:20px;width:9px;height:13px;
  background:linear-gradient(170deg,#1a1a26,#111118);
  border:1px solid #2a2a3a;border-radius:50% 50% 42% 42% / 55% 55% 45% 45%;
}
.d-mouse::before{
  content:'';position:absolute;top:4px;left:50%;transform:translateX(-50%);
  width:1px;height:5px;background:#242432;border-radius:1px;
}
.d-mouse::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;
  background:#dc2626;box-shadow:0 0 4px rgba(220,38,38,.9);
  animation:mouseLed 2.8s ease-in-out infinite;
}
@keyframes mouseLed{0%,88%,100%{opacity:1;}44%{opacity:.1;}}

/* ── PC TOWER ── */
.tower{
  position:absolute;top:118px;left:18px;width:26px;height:52px;z-index:3;
  background:#131318;border:2px solid #222228;border-radius:2px;
  display:flex;flex-direction:column;align-items:center;padding-top:6px;gap:4px;
}
.tower-led{
  width:6px;height:6px;border-radius:50%;background:#22c55e;
  animation:ledBlink 2.2s ease-in-out infinite;
}
@keyframes ledBlink{0%,85%,100%{opacity:1;}42%{opacity:.15;}}

/* ── FUTON ── */
.futon{
  position:absolute;bottom:72px;left:18px;width:210px;height:72px;z-index:3;
  background:linear-gradient(160deg,#243060 0%,#1a2448 50%,#141c38 100%);
  border:2px solid #38508a;border-radius:6px;
  cursor:pointer;transition:border-color .2s,box-shadow .2s;
  box-shadow:0 3px 12px rgba(0,0,0,.6),inset 0 1px 0 rgba(100,140,255,.1);
}
.futon:hover,.futon.active-zone{border-color:#6090e0;box-shadow:0 0 12px rgba(80,120,220,.25),inset 0 1px 0 rgba(100,140,255,.1);}
.futon::before{
  content:'FUTON';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:8px;letter-spacing:3px;color:rgba(160,180,255,.25);
  text-transform:uppercase;pointer-events:none;
}
.futon::after{
  content:'';position:absolute;top:5px;left:5px;right:5px;bottom:5px;
  border:1px dashed rgba(100,140,255,.12);border-radius:4px;
}
.pillow{
  position:absolute;top:380px;left:21px;width:20px;height:44px;z-index:6;
  background:linear-gradient(180deg,#304070,#202e58);
  border:1px solid #405080;border-radius:5px;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
}

/* ── SLEEPING CAT ── */
.room-cat{
  position:absolute;top:389px;left:186px;
  width:38px;height:22px;
  z-index:5;pointer-events:none;
}
.cat-body{
  position:relative;width:30px;height:14px;
  background:#2f2f2f;border-radius:50%;
  box-shadow:0 1px 5px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.04);
  animation:cat-breathe 4.1s ease-in-out infinite;
  transform-origin:center;
}
/* head with ear nubs via clip-path */
.cat-body::before{
  content:'';position:absolute;
  width:14px;height:11px;
  background:#2f2f2f;
  clip-path:polygon(0% 45%,18% 0%,32% 38%,68% 38%,82% 0%,100% 45%,100% 100%,0% 100%);
  top:-8px;left:0;
}
/* tail: sweeps right then curls up at the tip */
.cat-body::after{
  content:'';position:absolute;
  width:13px;height:18px;
  border:2.5px solid #505050;
  border-left:none;border-bottom:none;
  border-radius:0 50% 0 0;
  right:-12px;top:-10px;
  transform:rotate(12deg);
  transform-origin:left bottom;
}
@keyframes cat-breathe{
  0%,100%{transform:scaleY(1);}
  50%{transform:scaleY(1.12);}
}
/* cat ZZZ — offset from character's ZZZ so they don't sync */
@keyframes cat-zzz{
  0%{opacity:0;transform:translate(0,0) scale(.6);}
  30%{opacity:1;}
  100%{opacity:0;transform:translate(4px,-13px) scale(1);}
}
.room-cat::after{
  content:'z z';position:absolute;
  top:-9px;right:1px;
  font-size:7px;font-weight:700;letter-spacing:2px;
  color:#7aa8d8;pointer-events:none;
  animation:cat-zzz 2.7s ease-out infinite;
  animation-delay:1.3s;
}

/* ── FAN — mid-right, clear of window ── */
.fan{
  position:absolute;bottom:210px;right:35px;width:38px;height:38px;z-index:3;
  border-radius:50%;border:2px solid #383838;background:radial-gradient(circle,#1a1a1a,#0a0a0a);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.6);
  transition:box-shadow .4s;cursor:pointer;
}
.fan:hover{box-shadow:0 0 8px rgba(245,197,66,.25),0 2px 8px rgba(0,0,0,.6);}
.fan.on{box-shadow:0 0 14px rgba(180,220,255,.3),0 2px 8px rgba(0,0,0,.6);}
.fan-blade{
  width:24px;height:24px;border-radius:50%;
  background:conic-gradient(from 0deg,#181818 0deg,#2e2e2e 60deg,#141414 120deg,#2e2e2e 180deg,#141414 240deg,#2e2e2e 300deg,#181818 360deg);
  border:1.5px solid #2e2e2e;transition:border-color .4s;
}
.fan.on .fan-blade{
  animation:spinBlade .65s linear infinite;
  border-color:#3a3a3a;
  box-shadow:0 0 6px rgba(180,220,255,.18);
}
@keyframes spinBlade{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── DOOR — top wall, right ── */
.door{
  position:absolute;top:0;right:36px;width:50px;height:60px;z-index:5;
  background:rgba(255,255,255,.03);border:2px solid #2a2a2a;border-top:none;
  border-radius:0 0 3px 3px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;transition:all .2s;
}
.door:hover{background:rgba(245,197,66,.06);border-color:var(--gold);}
.door-knob{
  position:absolute;left:6px;bottom:14px;
  width:5px;height:5px;border-radius:50%;background:#555;
}
.door-icon{font-size:18px;}
.door-txt{font-size:8px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}

/* ── CHARACTER ── */
.char{
  position:absolute;z-index:10;width:24px;
  transition:top .65s cubic-bezier(.4,0,.2,1),left .65s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;align-items:center;
}
.char-bubble{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:rgba(10,10,14,.92);border:1px solid var(--border);
  border-radius:10px;padding:4px 8px;white-space:nowrap;
  font-size:10px;font-weight:700;pointer-events:none;backdrop-filter:blur(4px);
  min-width:120px;text-align:center;transition:border-color .5s;
}
.char-bubble::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--border);
}
.char-head{
  width:16px;height:16px;border-radius:50%;
  background:#9B6240;
  border:1.5px solid #7A4A28;
  position:relative;
}
/* Brown eyes */
.char-head::before,.char-head::after{
  content:'';position:absolute;width:2px;height:2px;border-radius:50%;
  background:#3D1C06;
  top:6px;
}
.char-head::before{left:3px;}
.char-head::after{right:3px;}

/* sleeping — Zs stacked vertically (top+bottom of head), each rotated on its side */
.char-head.sleeping::before,.char-head.sleeping::after{
  content:'Z';width:auto;height:auto;border-radius:0;background:transparent;
  font-size:6px;font-weight:800;color:#3a2010;line-height:1;
  left:50%;right:auto;transform:translateX(-50%) rotate(90deg);transform-origin:center;
}
.char-head.sleeping::before{top:1px;}
.char-head.sleeping::after {top:auto;bottom:1px;}
/* meditation — flat-line eyes */
.char-head.meditating::before,.char-head.meditating::after{
  content:'—';width:auto;height:auto;border-radius:0;background:transparent;
  font-size:6px;color:#3a2010;line-height:1;top:5px;letter-spacing:-1px;
}
.char-head.meditating::before{left:0px;}
.char-head.meditating::after{right:-1px;left:auto;}

/* char-figure wrapper — row layout when laying */
.char-figure{display:flex;flex-direction:column;align-items:center;gap:0;}
.char-figure.laying{flex-direction:row;gap:2px;align-items:center;}

/* Neck — standing */
.char-neck{
  width:5px;height:2px;
  background:#9B6240;
  border-left:1px solid #7A4A28;
  border-right:1px solid #7A4A28;
  flex-shrink:0;
}
/* Neck — laying: becomes a horizontal bridge with top/bottom borders */
.char-figure.laying .char-neck{
  width:3px;height:8px;
  border-left:none;border-right:none;
  border-top:1px solid #7A4A28;border-bottom:1px solid #7A4A28;
}

/* Body — laying: rotate -90° so shoulders face the head (left) and legs face right */
.char-figure.laying .char-body{
  transform:rotate(-90deg);
  /* visual becomes 18px wide × 22px tall; layout is still 22×18 → pull in phantom 2px each side */
  margin:0 -2px;
}
/* hide standing-only decorations when rotated */
.char-figure.laying .char-body::before,
.char-figure.laying .char-body::after{content:none;}

/*
  Body — black V-taper shirt + grey baggy joggers.
  clip-path polygon:
    Shirt (top 52%): full-width shoulders taper to ~60% waist.
    Waist notch at 52%: drops back out to full width → baggy jogger silhouette.
    Joggers (bottom 48%): full width, grey.

  At 22px wide:
    shoulders = 0–22px
    waist     = ~4px–18px  (18% → 82%)
    joggers   = 0–22px
*/
.char-body{
  width:22px;height:18px;
  position:relative;
  clip-path:polygon(
    0%   0%,
    100% 0%,
    82%  52%,
    82%  100%,
    18%  100%,
    18%  52%
  );
  background:linear-gradient(180deg,
    #0a0a0a 0%,
    #0f0f0f 50%,   /* black shirt */
    #d8d8d8 52%,
    #cccccc 100%); /* light grey joggers */
}
/* subtle collar V on shirt */
.char-body::before{
  content:'';position:absolute;
  top:1px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:2px solid transparent;
  border-right:2px solid transparent;
  border-top:3px solid #222;
}
/* leg split line down the centre of the jogger section */
.char-body::after{
  content:'';position:absolute;
  top:52%;bottom:0;
  left:50%;transform:translateX(-50%);
  width:1px;
  background:#2a2a2a;
}



/* ── CHARACTER ANIMATIONS ── */

/* IDLE — gentle breathing bob on every standing state */
@keyframes char-idle-bob {
  0%,100%{transform:translateY(0);}
  50%     {transform:translateY(-1.5px);}
}
.char-figure{animation:char-idle-bob 2.8s ease-in-out infinite;}

/* SLEEPING — slow whole-body pulse while laying */
@keyframes char-sleep-breathe {
  0%,100%{transform:scale(1);}
  45%    {transform:scale(1.045);}
}
.char-figure.laying{animation:char-sleep-breathe 3.6s ease-in-out infinite;}

/* ZZZ — floats up above the bubble when sleeping */
@keyframes char-zzz-float {
  0%  {opacity:0;transform:translate(0,0)   scale(.7);}
  35% {opacity:1;}
  100%{opacity:0;transform:translate(8px,-16px) scale(1.2);}
}
.char-bubble.zzz::before{
  content:'z z z';
  position:absolute;top:-18px;right:2px;
  font-size:8px;letter-spacing:3px;font-weight:700;
  color:#90b4ee;pointer-events:none;
  animation:char-zzz-float 2.2s ease-out infinite;
}

/* MEDITATING — float up + purple aura glow on head */
@keyframes char-med-float {
  0%,100%{transform:translateY(0);}
  50%    {transform:translateY(-3px);}
}
@keyframes char-med-aura {
  0%,100%{box-shadow:0 0 0 0 rgba(167,139,250,0);}
  50%    {box-shadow:0 0 10px 4px rgba(167,139,250,.38);}
}
.char-figure.meditating{animation:char-med-float 3s ease-in-out infinite;}
.char-head.meditating  {animation:char-med-aura  3s ease-in-out infinite;}

/* COOKING — side-to-side stir sway */
@keyframes char-cook {
  0%,100%{transform:translateY(0)   rotate(0deg);}
  30%    {transform:translateY(-1.5px) rotate(2.5deg);}
  70%    {transform:translateY(-1.5px) rotate(-2.5deg);}
}
.char-figure.cooking{animation:char-cook 1s ease-in-out infinite;}

/* FRIDGE CHECK — lean-in peek */
@keyframes char-fridge-check {
  0%,65%,100%{transform:translateX(0);}
  32%        {transform:translateX(4px);}
}
.char-figure.fridge-check{animation:char-fridge-check 2.4s ease-in-out infinite;}

/* FACIAL EXERCISES — head rapidly wobbles side-to-side (jaw/cheek work) */
@keyframes char-face-ex-head {
  0%  {transform:rotate(-7deg) scaleX(1.06);}
  25% {transform:rotate(7deg)  scaleX(0.94);}
  50% {transform:rotate(-5deg) scaleX(1.04);}
  75% {transform:rotate(5deg)  scaleX(0.96);}
  100%{transform:rotate(-7deg) scaleX(1.06);}
}
@keyframes char-face-ex-body {
  0%,100%{transform:translateY(0);}
  50%    {transform:translateY(-2px);}
}
.char-figure.face-ex{animation:char-face-ex-body .6s ease-in-out infinite;}
.char-head.face-ex  {animation:char-face-ex-head .35s ease-in-out infinite;}

/* AT-DESK WORKING — bird's-eye view, typing micro-bounce */
@keyframes char-desk-type {
  0%,100%{transform:translateY(0);}
  25%,75%{transform:translateY(-1px);}
  50%    {transform:translateY(0);}
}

/* ── SEATED IDLE (in chair, no activity) ── */
.char-figure.seated-idle{
  animation:none; /* no bob while sitting still */
}
.char-figure.seated-idle .char-body{
  /* Shorter bottom half — legs hidden by chair seat */
  clip-path:polygon(0% 0%,100% 0%,82% 52%,82% 76%,18% 76%,18% 52%);
}

/* ── AT-DESK WORKING (seated, bird's-eye facing UP toward desk) ──
   Character sits in chair facing the desk (which is above in screen space).
   We see: back of head → wide shoulders → arms reaching forward (upward). */
.char-figure.at-desk{
  position:relative;gap:2px;
  animation:char-desk-type 0.9s ease-in-out infinite;
}
/* Back of head — slightly wider oval from above */
.char-figure.at-desk .char-head{
  width:13px;height:11px;border-radius:50%;
  flex-shrink:0;
  position:relative;z-index:2; /* head renders over the arms behind it */
}
/* Neck hidden — body connects directly */
.char-figure.at-desk .char-neck{display:none;}
/* Upper back / shoulders from above — wider than head */
.char-figure.at-desk .char-body{
  width:22px;height:9px;
  clip-path:none;
  background:linear-gradient(180deg,#111 0%,#1a1a1a 100%);
  border-radius:50%;
  overflow:visible;
  position:relative;z-index:1;
  margin-top:0;
}
/* Left arm reaches UPWARD (toward desk, which is above in screen space).
   Bottom of arm is anchored near top of body; arm extends up past the head. */
.char-figure.at-desk .char-body::before{
  content:'';position:absolute;
  bottom:4px;left:1px;      /* start near top of 9px-tall body */
  width:6px;height:22px;    /* tall enough to extend past the head */
  background:#111;border-radius:3px 3px 2px 2px;
  transform:rotate(-9deg);transform-origin:bottom center;
}
/* Right arm — mirror */
.char-figure.at-desk .char-body::after{
  content:'';position:absolute;
  bottom:4px;right:1px;
  width:6px;height:22px;
  background:#111;border-radius:3px 3px 2px 2px;
  transform:rotate(9deg);transform-origin:bottom center;
}
/* Chair rotated so back faces viewer (into working position) */
.chair.at-desk{
  transform:scaleY(-1);
  transform-origin:center center;
}
.chair.at-desk .chair-back,.chair.at-desk .chair-seat{border-color:var(--gold);}

/* ── OUTSIDE ── */
.outside-wrap{flex:1;padding:20px;overflow-y:auto;display:none;}
.outside-wrap.show{display:block;}
.room-wrap.hidden{display:none;}
.out-intro{font-size:12px;color:var(--muted);margin-bottom:16px;max-width:480px;margin:0 auto 16px;}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:480px;margin:0 auto;}
.zone-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:18px 14px;cursor:pointer;transition:all .2s;text-align:center;
}
.zone-card:hover,.zone-card.active{border-color:var(--gold);background:rgba(245,197,66,.04);transform:translateY(-2px);}
.z-icon{font-size:32px;margin-bottom:6px;}
.z-name{font-size:13px;font-weight:700;margin-bottom:3px;}
.z-stat{font-size:10px;color:var(--muted);}
.zone-detail{
  max-width:480px;margin:14px auto 0;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:16px;display:none;
}
.zone-detail.show{display:block;}
.zd-title{font-size:13px;font-weight:700;margin-bottom:12px;}
.back-btn{
  display:block;margin:14px auto 0;max-width:480px;
  background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:8px 20px;border-radius:8px;cursor:pointer;font-size:12px;
}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ── STATS PANEL ── */
.stats-panel{
  width:230px;border-left:1px solid var(--border);padding:14px;
  overflow-y:auto;display:flex;flex-direction:column;gap:10px;flex-shrink:0;
}
.sblock{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;}
.sblock-title{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:11px;border-bottom:1px solid var(--border);}
.srow:last-child{border-bottom:none;}
.sval{font-weight:800;font-size:12px;}
.mood-pill{
  display:block;padding:5px 10px;border-radius:20px;
  font-size:10px;font-weight:700;text-align:center;margin-bottom:8px;
}
.gap-block{font-size:10px;color:var(--muted);line-height:1.8;}
.gap-now{font-size:20px;font-weight:900;display:block;}
.gap-pot{font-size:12px;font-weight:700;color:var(--purple);display:block;}
.gap-diff{font-size:10px;font-weight:700;color:var(--red);display:block;}
.hustle-row{padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;}
.hustle-row:last-child{border-bottom:none;}
.hustle-n{font-weight:600;}
.hustle-r{font-size:10px;color:var(--green);}
.dot-track{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.dot{width:13px;height:13px;border-radius:3px;border:1px solid #222;}

/* ── ZONE ACTION BUTTONS ── */
.zone-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.zone-btn{
  flex:1;min-width:90px;padding:9px 10px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--muted2);font-size:11px;font-weight:700;cursor:pointer;
  transition:border-color .15s,background .15s,color .15s;text-align:center;font-family:inherit;
}
.zone-btn:hover{border-color:var(--gold);background:rgba(245,197,66,.07);color:var(--gold);}
.zone-btn.zb-gold{background:rgba(245,197,66,.1);border-color:rgba(245,197,66,.35);color:var(--gold);}
.zone-btn.zb-gold:hover{background:rgba(245,197,66,.18);}
.walk-log-row{display:flex;gap:8px;align-items:center;margin-top:12px;}
.walk-log-row select{
  flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;cursor:pointer;
}

/* ── ACTIVITY MENU ── */
.act-menu{
  position:absolute;z-index:30;
  display:flex;flex-direction:column;align-items:flex-start;gap:5px;
  pointer-events:none;
}
.act-bubble{
  background:rgba(8,8,16,.93);border:1px solid #3a3a50;border-radius:20px;
  padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer;
  white-space:nowrap;backdrop-filter:blur(6px);color:var(--text);
  pointer-events:all;
  opacity:0;transform:translateY(6px) scale(.92);
  animation:bubblePop .22s ease forwards;
  transition:border-color .15s,background .15s;
  box-shadow:0 2px 10px rgba(0,0,0,.5);
}
.act-bubble:hover{background:rgba(245,197,66,.1);border-color:var(--gold);color:var(--gold);}
@keyframes bubblePop{to{opacity:1;transform:translateY(0) scale(1);}}

/* ── GAMING WARNING OVERLAY ── */
#gaming-warn{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.93);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
#gaming-warn.show{opacity:1;pointer-events:auto;}
.gwarn-box{
  background:#0b0b14;
  border:1px solid rgba(220,38,38,.3);
  border-radius:20px;padding:34px 28px 28px;
  max-width:320px;width:90%;text-align:center;
  box-shadow:0 0 80px rgba(220,38,38,.12);
}
.gwarn-icon{font-size:38px;margin-bottom:14px;}
.gwarn-title{
  font-size:17px;font-weight:800;color:#fff;
  margin-bottom:10px;line-height:1.35;
}
.gwarn-body{
  font-size:12.5px;color:rgba(255,255,255,.55);
  line-height:1.75;margin-bottom:26px;
}
.gwarn-btn-better{
  width:100%;background:linear-gradient(135deg,#6d28d9,#a855f7);
  border:none;border-radius:13px;color:#fff;
  font-size:14px;font-weight:800;padding:15px;cursor:pointer;
  letter-spacing:.4px;margin-bottom:10px;
  transition:transform .1s,box-shadow .15s;
}
.gwarn-btn-better:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,92,246,.5);}
.gwarn-btn-weak{
  width:100%;background:transparent;
  border:1px solid rgba(255,255,255,.08);
  border-radius:13px;color:rgba(255,255,255,.28);
  font-size:11px;font-weight:600;padding:10px;cursor:pointer;
  transition:border-color .15s,color .15s;
}
.gwarn-btn-weak:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.45);}
.gwarn-suggestions{
  display:flex;flex-direction:column;gap:7px;margin-top:10px;
}

/* PC tower tooltip */
.tower-tip{
  position:absolute;top:118px;left:48px;font-size:8px;color:#383838;
  text-transform:uppercase;letter-spacing:.5px;pointer-events:none;z-index:3;
  white-space:nowrap;
}

/* ── POSTER — bottom wall, between wardrobes ── */
.poster{
  position:absolute;bottom:1px;left:111px;width:208px;height:13px;z-index:6;
  background:linear-gradient(90deg,rgba(210,190,150,.08),rgba(230,210,170,.18),rgba(210,190,150,.08));
  border:1px solid rgba(210,185,130,.22);border-radius:1px;
  cursor:pointer;transition:border-color .2s,background .2s;
}
.poster:hover{
  border-color:rgba(210,185,130,.5);
  background:linear-gradient(90deg,rgba(210,190,150,.12),rgba(230,210,170,.28),rgba(210,190,150,.12));
}
/* ── POSTER MODAL / GALLERY ── */
.poster-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:2000;
  display:flex;align-items:center;justify-content:center;gap:12px;padding:14px;
}
.poster-card{
  width:min(278px,84vw);min-height:360px;border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;flex-shrink:0;
}
.poster-art{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.poster-body{
  position:relative;z-index:1;flex:1;
  display:flex;flex-direction:column;
  padding:26px 20px 14px;text-align:center;
}
.p-counter{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.28);
  text-transform:uppercase;margin-bottom:8px;}
.p-src{font-size:9px;letter-spacing:2px;text-transform:uppercase;
  font-weight:800;margin-bottom:20px;}
.p-quote{font-size:14.5px;font-weight:700;color:rgba(255,255,255,.92);
  line-height:1.68;letter-spacing:.15px;flex:1;
  display:flex;align-items:center;justify-content:center;}
.p-by{font-size:10px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;margin-top:18px;opacity:.75;}
.p-close{
  position:relative;z-index:1;margin:12px 20px 18px;
  background:transparent;border:1px solid rgba(255,255,255,.16);
  color:rgba(255,255,255,.34);padding:7px 0;border-radius:20px;
  cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  transition:all .2s;
}
.p-close:hover{border-color:rgba(255,255,255,.42);color:rgba(255,255,255,.6);}
.p-nav{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);
  color:white;font-size:26px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;line-height:1;padding:0 0 2px;
}

@media(max-width:480px){

.kitchen-wrap{flex:1;display:none;align-items:center;justify-content:center;

.kitch{position:absolute;inset:0;

/* upper cabinet strip — top wall, ends at right counter */
.k-ucab{position:absolute;top:0;left:0;width:358px;height:16px;background:#16140f;

/* top counter — horizontal (left:0 to right counter) */
.k-ct{position:absolute;top:16px;left:0;width:358px;height:74px;

  background:linear-gradient(90deg,#9a8c6a,#c4b080,#9a8c6a);}

/* lower cabinet fronts — starts right of left counter */
.k-lcab{position:absolute;top:90px;left:70px;width:288px;height:22px;
  background:#131008;border-bottom:1px solid #28241c;}

/* LEFT COUNTER — goes down left wall to island depth */
.k-lc{position:absolute;top:90px;left:0;width:70px;height:168px;
  background:linear-gradient(90deg,#1c1a16,#161410);

.k-lc::after{content:'';position:absolute;top:10px;left:0;right:0;bottom:0;

/* LEFT FRIDGE — on left counter, door faces into kitchen */
.k-fridge-l{position:absolute;top:110px;left:2px;width:66px;height:80px;
  background:linear-gradient(90deg,#20222e,#1c1e2c);

.k-fridge-l:hover{border-color:#4d9eff;box-shadow:0 0 8px rgba(77,158,255,.25);}
.k-fridge-l::after{content:'';position:absolute;top:42px;left:0;right:0;height:1px;background:#2c3040;}

/* right counter — extends to island bottom (y=330) */
.k-cr{position:absolute;top:16px;right:0;width:72px;height:314px;
  background:linear-gradient(180deg,#1c1a16,#161410);
  border-left:2px solid #38342e;border-bottom:2px solid #38342e;}

/* island — right edge touches right counter */
.k-island{position:absolute;top:258px;left:143px;width:215px;height:72px;
  background:linear-gradient(180deg,#201e18,#1a1814);

/* SINK — center of top counter */
.k-sink{position:absolute;top:26px;left:152px;width:54px;height:46px;

.k-cooker{position:absolute;top:160px;right:0;width:72px;height:72px;

/* MICROWAVE — mounted on right counter, top area */
.k-micro{position:absolute;top:16px;right:0;width:72px;height:38px;

.k-drain{position:absolute;top:28px;left:88px;width:58px;height:42px;

/* window above sink */
.k-win{position:absolute;top:0;left:152px;width:54px;height:16px;

/* (knife block and plant removed) */

/* island stools */
.k-stool{position:absolute;width:22px;height:15px;

/* floor — dark wood planks (matches bedroom) */
.k-floor{position:absolute;bottom:0;left:0;right:0;height:185px;

    repeating-linear-gradient(
      0deg,
      transparent 0px, transparent 27px,
      rgba(0,0,0,.22) 27px, rgba(0,0,0,.22) 28px

    repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 55px,
      rgba(255,255,255,.016) 55px, rgba(255,255,255,.016) 56px

/* back button */
.k-back{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);

.k-back:hover{border-color:rgba(255,255,255,.28);color:rgba(255,255,255,.65);}

.k-win{

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
function getMoney() {
  try { return JSON.parse(localStorage.getItem('money_os_data')) || {}; } catch(e) { return {}; }
}
function getWellness() {
  try { return JSON.parse(localStorage.getItem('wellness_data')) || {}; } catch(e) { return {}; }
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function toDate(d) { return new Date(d).toISOString().slice(0,10); }
function today() { return new Date().toISOString().slice(0,10); }
function daysAgo(n) { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
function fmt(n) {
  if (!n || isNaN(n)) return '£0';
  if (n >= 1e6) return '£' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1000) return '£' + (n/1000).toFixed(1) + 'k';
  return '£' + Math.round(n);
}
function clamp(v,mn,mx){return Math.min(mx,Math.max(mn,v));}

// Sleep stored as {bedtime:'22:00', wakeTime:'06:30'} — derive hours
function simSleepHours(sl) {
  if (!sl) return 0;
  if (typeof sl === 'object') {
    if (sl.bedtime && sl.wakeTime) {
      const [bh,bm] = sl.bedtime.split(':').map(Number);
      const [wh,wm] = sl.wakeTime.split(':').map(Number);
      let mins = (wh*60+wm) - (bh*60+bm);
      if (mins < 0) mins += 1440;
      return Math.round(mins/60*10)/10;
    }
    return parseFloat(sl.hours||sl.value||0)||0;
  }
  return parseFloat(sl)||0;
}

// ─────────────────────────────────────────────
//  CALCULATE
// ─────────────────────────────────────────────
function calc() {
  const M = getMoney();
  const W = getWellness();
  const tod = today();

  // ── Money ──────────────────────────────────
  const incEntries = M.income?.entries || [];
  const now = new Date();
  const msStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const yr1 = new Date(now); yr1.setFullYear(yr1.getFullYear()-1);

  let monthIncome = 0, yearIncome = 0;
  incEntries.forEach(e => {
    const amt = parseFloat(e.amount)||0;
    if (e.date >= msStart)        monthIncome += amt;
    if (new Date(e.date) >= yr1)  yearIncome  += amt;
  });

  const allHustles  = M.hustles?.items || [];
  const actHustles  = allHustles.filter(h => h.status === 'active' || parseFloat(h.revenue||0) > 0);
  // revenue field = user's target/goal, not necessarily earned — label accordingly
  const hustleRev   = actHustles.reduce((s,h) => s + (parseFloat(h.revenue)||0), 0);
  // monthTarget: stored in sim's own localStorage, editable in-sim. Default £50k/month.
  const monthTarget = parseFloat(localStorage.getItem('life_sim_month_target')) || 50000;
  const dreamAge    = parseInt(M.delusion?.targetAge) || null;
  const curAge      = parseInt(M.delusion?.currentAge) || null;

  // ── Wellness ──────────────────────────────
  const gymLog   = W.gym?.log  || {};
  const sleepLog = W.sleep?.log || {};
  const hydLog   = W.hydration?.log || {};
  const dietLog  = W.diet?.log  || {};
  const hydGoal  = W.hydration?.goal || 8;

  let gymSess7=0, sleepTotal=0, sleepDays=0, hydDays=0;
  for (let i=0;i<7;i++) {
    const d = daysAgo(i);
    // Gym: only count days with at least one exercise actually logged
    const gl = gymLog[d];
    if (gl && (typeof gl === 'object' ? (gl.exercises?.length > 0) : true)) gymSess7++;
    // Sleep: stored as {bedtime, wakeTime} — use helper to get hours
    const sl = sleepLog[d];
    if (sl !== undefined && sl !== null) {
      const hrs = simSleepHours(sl);
      if (hrs > 0) { sleepTotal += hrs; sleepDays++; }
    }
    // Hydration: any logged glass (≥1) counts as a day
    const hy = hydLog[d];
    if (hy !== undefined && hy !== null) {
      const cups = typeof hy === 'object' ? parseFloat(hy.cups||hy.count||hy.value||0) : parseFloat(hy)||0;
      if (cups >= 1) hydDays++;
    }
  }
  const sleepAvg   = sleepDays > 0 ? sleepTotal/sleepDays : 0;
  const gymToday   = !!(gymLog[tod] && (typeof gymLog[tod]==='object' ? gymLog[tod].exercises?.length>0 : true));
  const todayDiet  = dietLog[tod];
  const mealCount  = todayDiet
    ? (Array.isArray(todayDiet) ? todayDiet.length : (typeof todayDiet === 'object' ? Object.keys(todayDiet).length : 1))
    : 0;

  // ── Score components ──────────────────────
  // Income (max 35) — £1,000 = 35 pts, linear
  const incomeScore = Math.min(35, Math.round((monthIncome / 1000) * 35));
  // Hustles (max 25) — based on hustle revenue, £1,000/month = 25 pts
  const hustleScore = Math.min(25, Math.round((hustleRev / 1000) * 25));
  // Gym (max 22) — 7 sessions = max
  const gymScore    = clamp(gymSess7 * Math.ceil(22/7), 0, 22);
  // Sleep (max 10)
  let sleepScore = 0;
  if (sleepAvg >= 7 && sleepAvg <= 9) sleepScore = 10;
  else if (sleepAvg >= 6)              sleepScore =  5;
  else if (sleepAvg > 0)               sleepScore =  2;
  // Hydration (max 8)
  const hydScore = Math.round((hydDays/7)*8);

  const score     = incomeScore + hustleScore + gymScore + sleepScore + hydScore;
  const outputPct = clamp(score, 0, 100);

  // ── Status ────────────────────────────────
  let emoji, text, col;
  if      (outputPct <=  8) { emoji='😮‍💨'; text='Idle. Nothing being built.';  col='#ef4444'; }
  else if (outputPct <= 20) { emoji='😐';  text='Baseline. Not enough.';        col='#f97316'; }
  else if (outputPct <= 35) { emoji='🔄';  text='Moving. Keep pushing.';        col='#f59e0b'; }
  else if (outputPct <= 55) { emoji='💪';  text='Locked in. Don\'t stop.';      col='#a3e635'; }
  else if (outputPct <= 75) { emoji='🔥';  text='In the zone.';                 col='#22c55e'; }
  else                       { emoji='⚡';  text='Maximum output.';              col='#06b6d4'; }

  return {
    outputPct, emoji, text, col,
    monthIncome, yearIncome, hustleRev,
    actHustles, allHustles,
    monthTarget,
    dreamAge, curAge,
    gymSess7, gymToday, sleepAvg, hydDays, mealCount,
    gymLog, dietLog, M, W,
    incomeScore, hustleScore, gymScore, sleepScore, hydScore
  };
}

// ─────────────────────────────────────────────
//  CHARACTER POSITIONS (px within .room)
// ─────────────────────────────────────────────
const POS = {
  desk:        { top: 122, left: 105 },
  chair:       { top: 126, left: 134 },  // seated — character centred on seat
  futon:       { top: 392, left: 113 },
  futon_sleep: { top: 395, left: 30  },
  door:        { top: 72,  left: 340 },
  center:      { top: 232, left: 160 }
};

let _currentZone = 'center';

function moveChar(zone, instant) {
  _currentZone = zone;

  // ── always clear all zone highlights first ──
  if (zone !== 'chair') {
    _sittingOnChair = false;
    document.getElementById('chair')?.classList.remove('seated');
  }
  document.querySelector('.desk')?.classList.remove('active-zone');
  document.querySelector('.futon')?.classList.remove('active-zone');

  // ── apply highlight for the destination zone ──
  if (zone === 'desk') {
    document.querySelector('.desk')?.classList.add('active-zone');
  } else if (zone === 'futon' || zone === 'futon_sleep') {
    document.querySelector('.futon')?.classList.add('active-zone');
  }

  const p   = POS[zone] || POS.center;
  const el  = document.getElementById('char');
  if (instant) el.style.transition = 'none';
  el.style.top  = p.top  + 'px';
  el.style.left = p.left + 'px';
  if (instant) requestAnimationFrame(() => el.style.transition = '');
  saveState();
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
let _firstRender = true;
let _initDone    = false; // blocks saveState() during init so it can't stomp saved localStorage

function render() {
  const s = calc();

  // Output bar
  const fill = document.getElementById('out-fill');
  fill.style.width      = s.outputPct + '%';
  fill.style.background = s.col;
  const pctEl = document.getElementById('out-pct');
  pctEl.textContent = s.outputPct + '%';
  pctEl.style.color = s.col;

  // Potential badge
  document.getElementById('pot-badge').textContent = '🎯 ' + fmt(s.dreamNW) + ' potential';

  // Room brightness — driven by curtains + light switch only
  updateRoom();

  // Monitor / window / glow — driven by PC toggle
  updateDevices();

  // Fan
  document.getElementById('fan').className = 'fan' + (s.gymToday || s.gymSess7 >= 4 ? ' on' : '');

  // Status bubble — respect manual activity for 20 mins, and motiv phrases while showing
  const bubble = document.getElementById('char-bubble');
  const manualActive = _manualStatus && (Date.now() - _manualStatusTime < 20 * 60 * 1000);
  if (!manualActive && !_motivActive) {
    _manualStatus = null;
    bubble.innerHTML      = s.emoji + ' ' + s.text;
    bubble.style.borderColor = s.col;
  }

  // Character body colour = mood colour
  // char-body uses fixed CSS gradient (black shirt + joggers) — no override

  // Only set position on first spawn — after that the user controls it
  if (_firstRender) { moveChar('center', true); _firstRender = false; }

  // Outside zone stats
  const gs = document.getElementById('zs-gym');
  if (gs) gs.textContent = s.gymSess7 + ' session' + (s.gymSess7!==1?'s':'') + ' this week';
  const hs = document.getElementById('zs-hustle');
  if (hs) hs.textContent = s.hustleRev > 0 ? fmt(s.hustleRev) + '/month earned' : '£0 earned yet';
  const ks = document.getElementById('zs-kitchen');
  if (ks) ks.textContent = s.mealCount + ' meal' + (s.mealCount!==1?'s':'') + ' logged today';

  // Stats panel
  renderStats(s);
}

function renderStats(s) {
  // How far this month's income is toward the monthly target
  const monthGap  = Math.max(0, s.monthTarget - s.monthIncome);
  const monthProg = s.monthTarget > 0 ? Math.min(100, Math.round((s.monthIncome / s.monthTarget) * 100)) : 0;

  const hustleHTML = s.actHustles.length > 0
    ? s.actHustles.map(h => `
        <div class="hustle-row">
          <div class="hustle-n">${h.name || 'Unnamed hustle'}</div>
          <div class="hustle-r">${h.revenue ? fmt(h.revenue)+' target' : 'No target set'}</div>
        </div>`).join('')
    : `<div style="font-size:10px;color:var(--muted)">None active. Add one in the Money Dashboard → Hustles.</div>`;

  document.getElementById('stats-panel').innerHTML = `
    <div class="sblock">
      <div class="sblock-title">Character</div>
      <div class="mood-pill" style="background:${s.col}1a;color:${s.col}">${s.emoji} ${s.text}</div>
      <div class="gap-block">
        <span style="color:var(--muted);font-size:9px">THIS MONTH</span>
        <span class="gap-now" style="color:${s.monthIncome>0?'var(--green)':'var(--red)'}">${fmt(s.monthIncome)}</span>
        <span style="color:var(--muted);font-size:9px">MONTHLY TARGET</span>
        <span class="gap-pot" style="cursor:pointer" onclick="editTarget()" title="Click to change">
          ${fmt(s.monthTarget)} <span style="font-size:9px;opacity:.6">✏️</span>
        </span>
        <span class="gap-diff" style="color:${monthGap===0?'var(--green)':'var(--red)'}">
          ${monthGap===0 ? '✅ TARGET HIT' : fmt(monthGap)+' to go this month'}
        </span>
        <div style="margin-top:6px;height:5px;background:var(--border);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${monthProg}%;background:var(--green);border-radius:3px;transition:width 1s ease"></div>
        </div>
        <span style="color:var(--muted);font-size:9px;margin-top:2px;display:block">
          <span style="cursor:pointer;text-decoration:underline;color:var(--muted)" onclick="editTarget()">change monthly target</span>
        </span>
      </div>
    </div>

    <div class="sblock">
      <div class="sblock-title">💰 Money</div>
      <div class="srow"><span>This month</span><span class="sval" style="color:var(--gold)">${fmt(s.monthIncome)}</span></div>
      <div class="srow"><span>This year</span><span class="sval" style="color:var(--gold)">${fmt(s.yearIncome)}</span></div>
      <div class="srow"><span>Active hustles</span><span class="sval">${s.actHustles.length}</span></div>
    </div>

    <div class="sblock">
      <div class="sblock-title">🚀 Hustles</div>
      ${hustleHTML}
    </div>

    <div class="sblock">
      <div class="sblock-title">😴 Rest & Body</div>
      <div class="srow"><span>Gym this week</span><span class="sval" style="color:${s.gymSess7>=3?'var(--green)':s.gymSess7>0?'var(--gold)':'var(--muted)'}">${s.gymSess7}/7</span></div>
      <div class="srow"><span>Avg sleep</span><span class="sval" style="color:${s.sleepAvg>=7?'var(--green)':s.sleepAvg>0?'var(--orange)':'var(--muted)'}">${s.sleepAvg>0?s.sleepAvg.toFixed(1)+'h':'—'}</span></div>
      <div class="srow"><span>Water days</span><span class="sval">${s.hydDays}/7</span></div>
      <div class="srow"><span>Meals today</span><span class="sval">${s.mealCount}</span></div>
    </div>`;
}

function editTarget() {
  const current = parseFloat(localStorage.getItem('life_sim_month_target')) || 50000;
  const val = prompt('Set your monthly income target (£):', current);
  if (val === null) return;
  const n = parseFloat(val.replace(/[^0-9.]/g,''));
  if (!isNaN(n) && n > 0) {
    localStorage.setItem('life_sim_month_target', n);
    render();
  }
}

function showProgressModal() {
  const s = calc();
  const monthGap  = Math.max(0, s.monthTarget - s.monthIncome);
  const monthProg = s.monthTarget > 0 ? Math.min(100, Math.round((s.monthIncome / s.monthTarget) * 100)) : 0;

  const hustleHTML = s.actHustles.length > 0
    ? s.actHustles.map(h => `
        <div class="hustle-row">
          <div class="hustle-n">${h.name || 'Unnamed hustle'}</div>
          <div class="hustle-r">${h.revenue ? fmt(h.revenue)+' target' : 'No target set'}</div>
        </div>`).join('')
    : `<div style="font-size:10px;color:var(--muted)">None active — add one in Money → Hustles.</div>`;

  // Score per category — use values already computed in calc()
  const incomePts = s.incomeScore;
  const hustlePts = s.hustleScore;
  const gymPts    = s.gymScore;
  const sleepPts  = s.sleepScore;
  const hydroPts  = s.hydScore;

  const cats = [
    { emoji:'💰', label:'Income',     pts:incomePts, max:35,
      detail: s.monthIncome > 0 ? fmt(s.monthIncome)+' this month → '+incomePts+' pts' : 'No income logged yet',
      next: incomePts < 35 ? 'Earn more — £1,000/month = max 35 pts (linear)' : 'Max reached ✓' },
    { emoji:'🚀', label:'Hustles',    pts:hustlePts, max:25,
      detail: s.hustleRev > 0 ? fmt(s.hustleRev)+'/month → '+hustlePts+' pts' : '£0 earned from hustles yet',
      next: hustlePts < 25 ? 'Hustle revenue: £1,000/month = max 25 pts' : 'Max reached ✓' },
    { emoji:'🏋️', label:'Gym',       pts:gymPts,    max:22,
      detail: s.gymSess7 + '/7 sessions this week',
      next: gymPts < 22 ? (7 - s.gymSess7) + ' more session' + (7-s.gymSess7!==1?'s':'') + ' this week' : 'Max reached ✓' },
    { emoji:'😴', label:'Sleep',      pts:sleepPts,  max:10,
      detail: s.sleepAvg > 0 ? s.sleepAvg.toFixed(1)+'h avg this week' : 'No sleep logged',
      next: sleepPts < 10 ? (s.sleepAvg < 6 ? 'Log sleep to start earning pts' : 'Aim for 7–9h for max 10 pts') : 'Max reached ✓' },
    { emoji:'💧', label:'Hydration',  pts:hydroPts,  max:8,
      detail: s.hydDays + '/7 days logged this week',
      next: hydroPts < 8 ? 'Log water daily in Wellness Dashboard' : 'Max reached ✓' },
  ];

  const factorHTML = cats.map(c => {
    const barPct = Math.round((c.pts / c.max) * 100);
    const col = c.pts >= c.max ? 'var(--green)' : c.pts > 0 ? 'var(--gold)' : 'var(--muted)';
    return `
      <div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:15px">${c.emoji}</span>
            <span style="font-size:12px;font-weight:700;color:var(--text)">${c.label}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:10px;color:var(--muted)">${c.pts}/${c.max} pts</span>
            <span style="font-size:14px;font-weight:900;color:${col};min-width:32px;text-align:right">${c.pts}%</span>
          </div>
        </div>
        <div style="height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;margin-bottom:5px">
          <div style="height:100%;width:${barPct}%;background:${col};border-radius:3px;transition:width 1s ease"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)">
          <span>${c.detail}</span>
          <span style="color:${c.pts>=c.max?'var(--green)':'rgba(255,255,255,0.3)'};font-style:italic">${c.next}</span>
        </div>
      </div>`;
  }).join('');

  document.getElementById('prog-sheet-body').innerHTML = `
    <!-- Overall score -->
    <div class="sblock" style="text-align:center">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px;font-weight:700">Overall Output</div>
      <div style="font-size:52px;font-weight:900;color:${s.col};line-height:1">${s.outputPct}%</div>
      <div class="mood-pill" style="background:${s.col}1a;color:${s.col};margin-top:8px">${s.emoji} ${s.text}</div>
    </div>

    <!-- Score factors -->
    <div class="sblock">
      <div class="sblock-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>Score Breakdown</span>
        <span style="font-size:9px;color:var(--muted);font-weight:400">each % = 1 point out of 100</span>
      </div>
      ${factorHTML}
    </div>

    <!-- Money -->
    <div class="prog-grid">
      <div class="sblock">
        <div class="sblock-title">💰 Income</div>
        <div class="srow"><span>This month</span><span class="sval" style="color:var(--gold)">${fmt(s.monthIncome)}</span></div>
        <div class="srow"><span>This year</span><span class="sval" style="color:var(--gold)">${fmt(s.yearIncome)}</span></div>
        <div style="margin-top:8px">
          <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:4px">
            <span>Monthly target</span>
            <span style="cursor:pointer;text-decoration:underline" onclick="closeProgressModal();editTarget()">${fmt(s.monthTarget)} ✏️</span>
          </div>
          <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${monthProg}%;background:var(--green);border-radius:3px;transition:width 1s ease"></div>
          </div>
          <div style="font-size:10px;font-weight:700;color:${monthGap===0?'var(--green)':'var(--red)'};margin-top:4px">
            ${monthGap===0 ? '✅ TARGET HIT' : fmt(monthGap)+' to go'}
          </div>
        </div>
      </div>

      <div class="sblock">
        <div class="sblock-title">💪 Body</div>
        <div class="srow"><span>Gym (7d)</span><span class="sval" style="color:${s.gymSess7>=3?'var(--green)':s.gymSess7>0?'var(--gold)':'var(--muted)'}">${s.gymSess7}/7</span></div>
        <div class="srow"><span>Avg sleep</span><span class="sval" style="color:${s.sleepAvg>=7?'var(--green)':s.sleepAvg>0?'var(--orange)':'var(--muted)'}">${s.sleepAvg>0?s.sleepAvg.toFixed(1)+'h':'—'}</span></div>
        <div class="srow"><span>Water (7d)</span><span class="sval">${s.hydDays}/7</span></div>
        <div class="srow"><span>Meals today</span><span class="sval">${s.mealCount}</span></div>

    <!-- Hustles -->
    <div class="sblock">
      <div class="sblock-title">🚀 Active Hustles</div>
      ${hustleHTML}

  document.getElementById('prog-overlay').classList.add('open');
  document.getElementById('prog-sheet').classList.add('open');

}

function closeProgressModal() {

  document.getElementById('prog-sheet').classList.remove('open');

}

function goLoc(loc) {
  const rv = document.getElementById('view-room');
  const ov = document.getElementById('view-outside');
  const kv = document.getElementById('view-kitchen');
  const br = document.getElementById('btn-room');
  const bo = document.getElementById('btn-out');
  const bk = document.getElementById('btn-kitchen');
  // hide all
  rv.classList.add('hidden');
  ov.classList.remove('show');
  kv?.classList.remove('show');
  [br, bo, bk].forEach(b => b?.classList.remove('active'));
  // hide kitchen char by default
  const kChar = document.getElementById('k-char');
  if (kChar) kChar.style.display = 'none';
  closeActivityMenu();

  if (loc === 'room') {
    rv.classList.remove('hidden'); br.classList.add('active');
  } else if (loc === 'outside') {
    ov.classList.add('show'); bo.classList.add('active'); closeZone();
  } else if (loc === 'kitchen') {
    kv?.classList.add('show'); bk?.classList.add('active');
    // Show kitchen char and sync skin/body color from room char
    if (kChar) {
      const roomHead = document.getElementById('char-head');
      const roomBody = document.getElementById('char-body');
      const kHead = document.getElementById('k-head');
      const kBody = document.getElementById('k-body');
      if (roomHead && kHead) kHead.style.background = roomHead.style.background;
      if (roomBody && kBody) kBody.style.background = roomBody.style.background;
      kChar.style.display = 'flex';
    }
    kMoveChar('entry');
    const kb = document.getElementById('k-bubble');
    if (kb) kb.textContent = '🍳 In the kitchen';
  }
}

function showDoorMenu(e) {
  e.stopPropagation();
  moveChar('door');
  showActivityMenu([
    { icon:'🌍', label:'Go outside', action: () => goLoc('outside') },
    { icon:'🍳', label:'Kitchen',    action: () => goLoc('kitchen') },
  ], { top: 130, left: 195 }, 'down');
}

function roomClick() {
  // Clicking empty room floor → dismiss activity menu and walk back to center
  if (_sittingOnChair) return; // stay seated if in chair
  if (_currentZone === 'center') return; // already there
  closeActivityMenu();
  clearActivityTimer();
  clearGamingWarningTimer();
  hideGamingWarning();
  _gamingStayWeakCount = 0;
  resetCharVisual();
  moveChar('center');
  _manualStatus = null;
  render();
}

// ─────────────────────────────────────────────
//  ZONE DETAILS
// ─────────────────────────────────────────────
let _openZone = null;

function openZone(z) {
  if (_openZone === z) { closeZone(); return; }
  _openZone = z;
  ['gym','hustle','walk','kitchen'].forEach(id => {
    document.getElementById('zc-'+id)?.classList.toggle('active', id === z);
  });
  const s = calc();
  const detail = document.getElementById('zone-detail');
  document.getElementById('zd-title').textContent = {
    gym:'🏋️ Gym', hustle:'💼 Side Hustle', walk:'🚶 Walk', kitchen:'🍳 Kitchen'
  }[z];
  document.getElementById('zd-body').innerHTML = buildZoneHTML(z, s);
  detail.classList.add('show');
}

function closeZone() {
  _openZone = null;
  document.getElementById('zone-detail').classList.remove('show');
  ['gym','hustle','walk','kitchen'].forEach(id => document.getElementById('zc-'+id)?.classList.remove('active'));
}

function _getWalkLog() {
  try { return JSON.parse(localStorage.getItem('life_sim_walks') || '[]'); } catch(e) { return []; }
}
function logWalk(mins) {
  mins = parseInt(mins) || 0;
  if (!mins) return;
  const log = _getWalkLog();
  log.unshift({ date: today(), mins, ts: Date.now() });
  localStorage.setItem('life_sim_walks', JSON.stringify(log.slice(0, 200)));
  openZone('walk'); // refresh panel
}

function buildZoneHTML(z, s) {
  if (z === 'gym') {
    const dots = Array.from({length:14},(_,i) => {
      const d = daysAgo(i);
      const done = !!s.gymLog[d];
      return `<div class="dot" style="background:${done?'#22c55e':'#1a1a22'};border-color:${done?'#22c55e':'#2a2a32'}" title="${d}"></div>`;
    }).join('');
    const streak = calcStreak(s.gymLog);
    return `
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px">Last 14 days</div>
      <div class="dot-track">${dots}</div>
      <div style="margin-top:10px;display:flex;gap:16px;font-size:12px">
        <span>This week: <strong style="color:${s.gymSess7>=3?'var(--green)':'var(--gold)'}">${s.gymSess7} sessions</strong></span>
        <span>Streak: <strong style="color:var(--orange)">${streak} days</strong></span>
      </div>
      <div class="zone-btns">
        <button class="zone-btn zb-gold" onclick="window.parent.postMessage({action:'openWellnessGym'},'*')">💪 Log Workout</button>
        <button class="zone-btn" onclick="window.parent.postMessage({action:'openWellnessMeals'},'*')">🥗 Log Meals</button>
      </div>`;
  }

  if (z === 'hustle') {
    const cards = s.actHustles.length === 0
      ? `<div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:4px">
           No active hustles yet. Add one in the Money Dashboard and it'll show here.
         </div>`
      : s.actHustles.map(h => `
          <div style="background:var(--bg2);border-radius:10px;padding:10px;margin-bottom:8px">
            <div style="font-weight:700;font-size:13px">${h.name||'Unnamed'}</div>
            ${h.desc?`<div style="font-size:10px;color:var(--muted);margin-top:2px">${h.desc}</div>`:''}
            <div style="font-size:12px;color:var(--green);margin-top:4px;font-weight:700">${h.revenue?fmt(h.revenue)+' revenue':'No revenue logged yet'}</div>
            ${h.action?`<div style="font-size:10px;color:var(--gold);margin-top:4px">▶ Next: ${h.action}</div>`:''}
          </div>`).join('');
    return cards + `
      <div class="zone-btns">
        <button class="zone-btn zb-gold" onclick="window.parent.postMessage({action:'openMoneyHustles'},'*')">🚀 My Hustles</button>
        <button class="zone-btn" onclick="window.parent.postMessage({action:'openMoneyIncome'},'*')">💵 Log Income</button>
      </div>`;
  }

  if (z === 'walk') {
    const walks    = _getWalkLog();
    const todayW   = walks.filter(w => w.date === today());
    const totalMin = todayW.reduce((a,w) => a + (w.mins||0), 0);
    const recent   = walks.slice(0, 6);
    const recentHTML = recent.length ? recent.map(w => `
      <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px">
        <span style="color:var(--muted)">${w.date === today() ? 'Today' : w.date}</span>
        <strong style="color:var(--green)">${w.mins} min</strong>
      </div>`).join('') : '';
    return `
      <div style="margin-bottom:10px">
        ${totalMin > 0
          ? `<div style="font-size:13px;font-weight:800;color:var(--green)">${totalMin} min walked today</div>`
          : `<div style="font-size:12px;color:var(--muted)">No walks logged today.</div>`}
        <div style="font-size:10px;color:var(--muted);margin-top:3px">20 minutes outside rewires your brain. Cortisol drops. Ideas arrive.</div>
      </div>
      ${recentHTML}
      <div class="walk-log-row">
        <select id="walk-dur">
          <option value="15">15 min</option>
          <option value="20" selected>20 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
          <option value="90">90 min</option>
        </select>
        <button class="zone-btn zb-gold" style="flex:1" onclick="logWalk(document.getElementById('walk-dur').value)">✓ Log Walk</button>
      </div>`;
  }

  if (z === 'kitchen') {
    const todayLog = s.dietLog[today()];
    const meals = todayLog
      ? (Array.isArray(todayLog) ? todayLog : Object.values(todayLog))
      : [];
    const mealsHTML = meals.length === 0
      ? `<div style="font-size:12px;color:var(--muted);margin-bottom:4px">No meals logged today.</div>`
      : `<div style="font-size:10px;color:var(--muted);margin-bottom:8px">Today — ${meals.length} meal${meals.length!==1?'s':''}</div>
         ${meals.map(m=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">${typeof m==='string'?m:(m.name||m.goal||JSON.stringify(m))}</div>`).join('')}`;
    return mealsHTML + `
      <div class="zone-btns">
        <button class="zone-btn zb-gold" onclick="closeZone();goLoc('kitchen')">🍳 Go to Kitchen</button>
        <button class="zone-btn" onclick="window.parent.postMessage({action:'openWellnessMeals'},'*')">🥗 Log a Meal</button>
      </div>`;
  }

  return '';
}

function calcStreak(log) {
  let streak = 0;
  for (let i=0; i<60; i++) {
    if (log[daysAgo(i)]) streak++;
    else if (i > 0) break;
  }
  return streak;
}

// ─────────────────────────────────────────────
//  DEVICE TOGGLES
// ─────────────────────────────────────────────
let _pcOn       = false;
let _miniOn     = false;
let _lastDevice = null;   // 'pc' or 'mac' — whichever was turned on last
let _curtainsDrawn = false;
let _lightOn    = false;

function updateRoom() {
  const room = document.getElementById('the-room');
  if (!room) return;
  // room-glow is a SIBLING of .room (not a child), so room filter never touches it.
  // No counter-filter needed — glow brightness is always exactly what the CSS says.
  if (_lightOn) {
    room.className = 'room lit';
  } else if (_curtainsDrawn) {
    room.className = 'room dim';
  } else {
    room.className = 'room mid';
  }
}

function toggleCurtains() {
  _curtainsDrawn = !_curtainsDrawn;
  const win = document.getElementById('room-window');
  if (win) {
    const h = new Date().getHours();
    const isNight = h >= 22 || h < 6;
    win.className = 'window' + (_curtainsDrawn ? ' curtains' : isNight ? ' night' : '');
  }
  updateRoom();
  saveState();
}

function toggleLight() {
  _lightOn = !_lightOn;
  const sw = document.getElementById('light-switch');
  if (sw) sw.className = 'light-switch' + (_lightOn ? ' on' : '');
  updateRoom();
  saveState();
}

function updateDevices() {
  const mon   = document.getElementById('monitor');
  const glow  = document.getElementById('room-glow');
  const win   = document.getElementById('room-window');
  const tower = document.getElementById('pc-tower');
  const mini  = document.getElementById('d-mini');

  // Monitor colour: last-on device wins; neither on = dark
  const anyOn = _pcOn || _miniOn;
  let monClass = 'd-monitor';
  if (anyOn) monClass += _lastDevice === 'mac' ? ' on-mac' : ' on-pc';
  if (mon) mon.className = monClass;

  // Room glow — colour matches active monitor
  if (glow) glow.className = 'room-glow' + (!anyOn ? '' : _lastDevice === 'mac' ? ' on-mac' : ' on-pc');

  // Window — curtains state is authoritative; falls back to time-of-day
  const h = new Date().getHours();
  const isNight = h >= 22 || h < 6;
  let winClass = 'window';
  if (_curtainsDrawn)  winClass += ' curtains';
  else if (isNight)    winClass += ' night';
  if (win) win.className = winClass;

  // Window spill light — only visible when curtains open and daytime
  const winLight = document.getElementById('win-light');
  if (winLight) winLight.style.opacity = (!_curtainsDrawn && !isNight) ? '1' : '0';

  // Tower LED
  if (tower) tower.className = 'tower' + (_pcOn ? '' : ' off');

  // Mac Mini LED
  if (mini) mini.className = 'd-mini' + (_miniOn ? ' on' : '');
}

function togglePC(e) {
  e.stopPropagation();
  _pcOn = !_pcOn;
  if (_pcOn) _lastDevice = 'pc';
  updateDevices();
  saveState();
}

function toggleMini(e) {
  e.stopPropagation();
  _miniOn = !_miniOn;
  if (_miniOn) _lastDevice = 'mac';
  updateDevices();
  saveState();
}
