<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Life OS — Joshua</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #080a0f; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP TAB BAR ── */
  #tab-bar {
    height: 48px;
    background: #08090e;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
    z-index: 9999;
    user-select: none;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
    touch-action: pan-x;
    overscroll-behavior-x: contain;
  }
  #tab-bar::-webkit-scrollbar { display: none; }

  .bar-logo {
    padding: 0 14px 0 16px;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    border-right: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tab {
    padding: 0 22px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
  }
  .tab:hover { color: rgba(255,255,255,0.65); }
  .tab .tab-icon { font-size: 15px; }
  .tab .tab-label { font-size: 12.5px; }

  .tab.money.active   { color: #f5c542; border-bottom-color: #f5c542; }
  .tab.wellness.active { color: #a855f7; border-bottom-color: #a855f7; }
  .tab.sim.active     { color: #a855f7; border-bottom-color: #a855f7; }

  /* small dot on inactive tabs to show they're loaded */
  .tab .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0;
    margin-left: 2px;
    transition: opacity 0.3s;
    flex-shrink: 0;
  }
  .tab.ready .dot { opacity: 0.4; }

  /* ── IFRAME PANELS ── */
  .panel {
    flex: 1;
    overflow: hidden;
    display: none;
    position: relative;
  }
  .panel.active { display: flex; }
  .panel iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #080a0f;
  }

  /* ── LOADING OVERLAY ── */
  .panel-loading {
    position: absolute;
    inset: 0;
    background: #080a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    pointer-events: none;
  }
  .panel-loading.hidden { display: none; }
  .panel-loading .spin {
    width: 28px; height: 28px;
    border: 2px solid rgba(255,255,255,0.08);
    border-top-color: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .panel-loading .load-label {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── TOP TAB BAR ── -->
<div id="tab-bar">
  <div class="bar-logo">Life OS</div>
  <button class="tab money active" id="tab-money" onclick="switchTab('money', this)">
    <span class="tab-icon">💰</span>
    <span class="tab-label">Money</span>
    <span class="dot"></span>
  </button>
  <button class="tab wellness" id="tab-wellness" onclick="switchTab('wellness', this)">
    <span class="tab-icon">💪</span>
    <span class="tab-label">Wellness</span>
    <span class="dot"></span>
  </button>
  <button class="tab sim" id="tab-sim" onclick="switchTab('sim', this)">
    <span class="tab-icon">🏠</span>
    <span class="tab-label">Life Sim</span>
    <span class="dot"></span>
  </button>
</div>

<!-- ── MONEY PANEL ── -->
<div class="panel active" id="panel-money">
  <div class="panel-loading" id="load-money">
    <div class="spin"></div>
    <div class="load-label">Loading Money</div>
  </div>
  <iframe id="frame-money" src="money.html" onload="onFrameLoad('money')"></iframe>
</div>

<!-- ── WELLNESS PANEL ── -->
<div class="panel" id="panel-wellness">
  <div class="panel-loading" id="load-wellness">
    <div class="spin"></div>
    <div class="load-label">Loading Wellness</div>
  </div>
  <iframe id="frame-wellness" data-src="wellness.html" onload="onFrameLoad('wellness')"></iframe>
</div>

<!-- ── LIFE SIM PANEL ── -->
<div class="panel" id="panel-sim">
  <div class="panel-loading" id="load-sim">
    <div class="spin"></div>
    <div class="load-label">Loading Sim</div>
  </div>
  <iframe id="frame-sim" data-src="life-sim.html" onload="onFrameLoad('sim')"></iframe>
</div>

<script>
  const TABS = ['money', 'wellness', 'sim'];
  let _active = 'money';

  function switchTab(name, btn) {
    if (name === _active) return;
    _active = name;

    // Deactivate all
    TABS.forEach(t => {
      document.getElementById('panel-' + t).classList.remove('active');
      document.getElementById('tab-' + t).classList.remove('active');
    });

    // Activate selected
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');

    // Lazy-load iframe if not yet started
    const frame = document.getElementById('frame-' + name);
    if (frame.dataset.src && !frame.src.endsWith(frame.dataset.src)) {
      frame.src = frame.dataset.src;
    }
  }

  function onFrameLoad(name) {
    // For money, we wait for the iframe to post 'moneyReady' before removing the
    // overlay — that fires after renderDashboard() has actually run and painted.
    // Other frames use the old rAF fallback.
    if (name !== 'money') {
      requestAnimationFrame(function() {
        const overlay = document.getElementById('load-' + name);
        if (overlay) overlay.remove();
        document.getElementById('tab-' + name).classList.add('ready');
      });
    }
    // Failsafe: if moneyReady never arrives, drop the overlay after 3s
    if (name === 'money') {
      setTimeout(function() {
        const overlay = document.getElementById('load-money');
        if (overlay) overlay.remove();
        document.getElementById('tab-money').classList.add('ready');
      }, 3000);
    }
  }

  // Money iframe signals when it has actually rendered data
  window.addEventListener('message', function(ev) {
    if (ev.data && ev.data.action === 'moneyReady') {
      requestAnimationFrame(function() {
        const overlay = document.getElementById('load-money');
        if (overlay) overlay.remove();
        document.getElementById('tab-money').classList.add('ready');
      });
    }
    // existing cross-frame routing below
  });

  // Always boot to Money Dashboard — no session restore.

  // Cross-frame routing from life-sim → wellness / money
  window.addEventListener('message', function(ev) {
    const simFrame = document.getElementById('frame-sim');
    if (ev.source !== simFrame?.contentWindow) return;
    if (!ev.data || !ev.data.action) return;
    const { action } = ev.data;

    function toWellness(page) {
      switchTab('wellness', document.getElementById('tab-wellness'));
      sessionStorage.setItem('life_os_tab', 'wellness');
      setTimeout(() => {
        const wf = document.getElementById('frame-wellness');
        if (wf?.contentWindow) wf.contentWindow.postMessage({ action: 'showWellnessPage', page }, '*');
      }, 250);
    }
    function toMoney(page) {
      switchTab('money', document.getElementById('tab-money'));
      sessionStorage.setItem('life_os_tab', 'money');
      setTimeout(() => {
        const mf = document.getElementById('frame-money');
        if (mf?.contentWindow) mf.contentWindow.postMessage({ action: 'showMoneyPage', page }, '*');
      }, 250);
    }

    if (action === 'openWellnessMeals')  toWellness('mealideas');
    if (action === 'openWellnessGym')    toWellness('gym');
    if (action === 'openWellnessFacial') toWellness('facial');
    if (action === 'openMoneyHustles')   toMoney('hustles');
    if (action === 'openMoneyIncome')    toMoney('income');
  });
</script>
</body>
</html>
